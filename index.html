<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LGSHOPCOMPANY | BASE64 ARSENAL</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3c3c; --gold: #facc15; --black: #050505; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        #app { display: grid; grid-template-columns: 260px 1fr 350px; height: 100vh; }
        aside { background: #080808; border-right: 1px solid #1a1a1a; padding: 20px; }
        main { padding: 30px; overflow-y: auto; background: radial-gradient(circle at top, #111, #050505); }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .w-card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 8px; text-align: center; }
        .w-img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .w-name { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 10px; height: 32px; }
        .w-price { color: var(--gold); font-weight: 900; }
        .pos-panel { background: #080808; border-left: 1px solid #1a1a1a; padding: 20px; }
        .murt-btn { width: 100%; padding: 15px; background: var(--red); border: none; color: #fff; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <aside>
        <h2 style="font-family:'Syncopate'; color:var(--red); font-size:12px;">MURTHELP v8</h2>
        <p style="color:#444; font-size:10px;">ENCRYPTED SESSION</p>
    </aside>

    <main>
        <h2 style="font-family:'Syncopate'; color:var(--gold); margin-bottom:30px;">REAL ARSENAL (BYPASS CHẶN)</h2>
        <div class="weapon-grid" id="w-list"></div>
    </main>

    <div class="pos-panel">
        <h3 style="font-family:'Syncopate'; color:var(--red); font-size:12px;">ORDER LIST</h3>
        <div id="cart" style="height:70%; overflow-y:auto; margin:20px 0; border-bottom:1px solid #1a1a1a;"></div>
        <div id="total" style="font-size:20px; color:var(--gold); text-align:right;">$0</div>
        <button class="murt-btn">EXECUTE DEAL</button>
    </div>
</div>

<script>
    // SỬ DỤNG ICON SVG TRỰC TIẾP (KHÔNG CẦN TẢI ẢNH) - CHẮC CHẮN HIỂN THỊ
    const weapons = [
        { n: "AWM SNIPER MAGNUM", p: 25000, svg: `<svg viewBox="0 0 100 40" fill="#fff"><path d="M5,25 L20,25 L25,20 L80,20 L85,25 L95,25 L95,28 L85,28 L80,32 L25,32 L20,28 L5,28 Z M40,15 L60,15 L62,20 L38,20 Z"/></svg>` },
        { n: "M416 TACTICAL AR", p: 5200, svg: `<svg viewBox="0 0 100 40" fill="#fff"><path d="M10,20 L30,20 L35,15 L70,15 L75,20 L90,20 L90,25 L75,25 L72,35 L65,35 L68,25 L35,25 L32,38 L25,38 L28,25 L10,25 Z"/></svg>` },
        { n: "AK-47 KALASHNIKOV", p: 4800, svg: `<svg viewBox="0 0 100 40" fill="#fff"><path d="M10,25 L25,25 L30,20 L85,20 L90,22 L90,25 L85,28 L30,28 L28,38 L20,38 L22,28 L10,28 Z M50,15 L70,18 L70,20 L50,20 Z"/></svg>` },
        { n: "KAR98K CLASSIC", p: 12000, svg: `<svg viewBox="0 0 100 40" fill="#fff"><path d="M5,22 L25,22 L85,20 L95,20 L95,23 L85,25 L25,28 L5,28 Z M45,15 L55,15 L55,20 L45,20 Z"/></svg>` },
        { n: "DESERT EAGLE .50", p: 2500, svg: `<svg viewBox="0 0 100 60" fill="#fff"><path d="M30,20 L80,20 L80,35 L70,35 L65,55 L45,55 L50,35 L30,35 Z M35,25 L75,25 L75,30 L35,30 Z"/></svg>` }
    ];

    function render() {
        document.getElementById('w-list').innerHTML = weapons.map(w => `
            <div class="w-card">
                <div class="w-img">${w.svg}</div>
                <div class="w-name">${w.n}</div>
                <b class="w-price">$${w.p.toLocaleString()}</b>
                <button onclick="Swal.fire('Added','','success')" style="margin-top:10px; background:none; border:1px solid #333; color:#fff; padding:5px 10px; cursor:pointer; width:100%">ADD</button>
            </div>
        `).join('');
    }
    render();
</script>
</body>
</html>
