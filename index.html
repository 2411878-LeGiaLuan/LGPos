<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGShop POS Quantum v10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --dark: #0f172a; --success: #10b981;
            --danger: #ef4444; --bg: #f8fafc; --sidebar-w: 100px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; color: var(--dark); }

        /* SIDEBAR PRO */
        .sidebar { 
            width: var(--sidebar-w); background: var(--dark); display: flex; flex-direction: column; 
            align-items: center; padding: 30px 0; gap: 25px; z-index: 1000;
        }
        .nav-item { 
            color: #64748b; width: 60px; height: 60px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* MAIN LAYOUT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-bar { 
            height: 80px; background: white; border-bottom: 1px solid #e2e8f0; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px;
        }
        .shop-brand { font-size: 24px; font-weight: 800; color: var(--dark); letter-spacing: -1px; }

        .content-area { flex: 1; padding: 30px; overflow-y: auto; height: calc(100vh - 80px); }
        .page { display: none; animation: pageIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BÁN HÀNG GRID */
        .pos-grid { display: grid; grid-template-columns: 1fr 450px; gap: 30px; height: 100%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; align-content: start; }
        
        .p-card { 
            background: white; border-radius: 24px; padding: 25px; text-align: center; cursor: pointer;
            border: 2px solid transparent; transition: 0.3s; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .p-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .p-card .emoji { font-size: 50px; margin-bottom: 15px; display: block; }
        .p-card .stock { position: absolute; top: 15px; left: 15px; font-size: 11px; font-weight: 800; color: var(--primary); background: #eef2ff; padding: 4px 10px; border-radius: 10px; }
        .p-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 5px; }
        .p-card b { color: var(--primary); font-size: 18px; }

        /* GIỎ HÀNG */
        .cart-panel { background: white; border-radius: 30px; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .cart-header { padding: 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .cart-list { flex: 1; padding: 20px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8fafc; border-radius: 20px; margin-bottom: 10px; }
        
        .cart-footer { padding: 30px; border-top: 1px solid #f1f5f9; background: #f8fafc; border-radius: 0 0 30px 30px; }
        .pay-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .m-btn { padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .m-btn.active { border-color: var(--primary); color: var(--primary); background: #eef2ff; }

        .btn-pay { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--dark); color: white; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-pay:hover { background: var(--primary); transform: scale(1.02); }

        /* DASHBOARD STATS */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .s-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .s-card label { color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .s-card h2 { font-size: 28px; font-weight: 800; margin-top: 5px; }

        /* QR MODAL */
        #qr-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .qr-card { background: white; padding: 40px; border-radius: 40px; text-align: center; width: 450px; }
        .qr-card img { width: 250px; height: 250px; border-radius: 20px; margin: 20px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="nav('pos', this)"><i class="fas fa-shopping-bag"></i><span>Bán hàng</span></div>
        <div class="nav-item" onclick="nav('inventory', this)"><i class="fas fa-boxes"></i><span>Kho</span></div>
        <div class="nav-item" onclick="nav('reports', this)"><i class="fas fa-chart-pie"></i><span>Báo cáo</span></div>
        <div class="nav-item" onclick="resetSystem()"><i class="fas fa-sync-alt"></i><span>Làm mới</span></div>
    </div>

    <div class="main">
        <div class="top-bar">
            <div class="shop-brand">LGSHOP <span style="color: var(--primary);">TITANIUM v10</span></div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <div style="font-weight: 800;" id="timer">00:00:00</div>
                    <small style="color: #64748b; font-weight: 600;">Chào bạn, Gia Luân!</small>
                </div>
                <div style="width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px;">GL</div>
            </div>
        </div>

        <div class="content-area">
            <div id="pos" class="page active">
                <div class="pos-grid">
                    <div class="menu-grid" id="product-list">
                        </div>
                    <div class="cart-panel">
                        <div class="cart-header">
                            <h3 style="font-weight: 800;">CHI TIẾT ĐƠN HÀNG</h3>
                            <span id="order-id" style="color: #64748b; font-weight: 700;">#000000</span>
                        </div>
                        <div class="cart-list" id="cart-items">
                            </div>
                        <div class="cart-footer">
                            <div class="pay-methods">
                                <button class="m-btn active" id="m-cash" onclick="setMethod('Tiền mặt')">💵 TIỀN MẶT</button>
                                <button class="m-btn" id="m-qr" onclick="setMethod('Quét QR')">📲 QUÉT QR</button>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                                <span style="font-weight: 700; color: #64748b;">TỔNG THANH TOÁN</span>
                                <b style="font-size: 32px; font-weight: 900; color: var(--primary);" id="total-val">0 đ</b>
                            </div>
                            <button class="btn-pay" onclick="handlePayment()">XÁC NHẬN THANH TOÁN</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="reports" class="page">
                <div class="stat-grid">
                    <div class="s-card"><label>Doanh thu hôm nay</label><h2 id="st-rev">0 đ</h2></div>
                    <div class="s-card"><label>Tổng số đơn</label><h2 id="st-orders">0</h2></div>
                    <div class="s-card"><label>Khách QR</label><h2 id="st-qr">0</h2></div>
                    <div class="s-card"><label>Sản phẩm bán chạy</label><h2 id="st-hot" style="color: var(--primary);">--</h2></div>
                </div>
                <div style="background: white; padding: 40px; border-radius: 30px; height: 450px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div id="inventory" class="page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 style="font-weight: 800;">QUẢN LÝ KHO LGSHOP</h2>
                    <button class="btn-pay" style="width: auto; padding: 12px 30px;" onclick="addNewProduct()">+ Thêm món mới</button>
                </div>
                <div id="inv-table-container">
                    </div>
            </div>
        </div>
    </div>

    <div id="qr-overlay">
        <div class="qr-card">
            <h2 style="font-weight: 800;">THANH TOÁN QR</h2>
            <p id="qr-amount" style="font-weight: 700; color: var(--primary); font-size: 24px; margin-top: 10px;"></p>
            <img id="qr-gen" src="" alt="QR">
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Vui lòng quét mã qua ứng dụng Ngân hàng hoặc Ví điện tử</p>
            <button class="btn-pay" onclick="completeOrder()">XÁC NHẬN ĐÃ THU TIỀN</button>
        </div>
    </div>

<script>
    // --- KHỞI TẠO DỮ LIỆU ---
    let products = JSON.parse(localStorage.getItem('LGS_PROD')) || [
        { id: 101, name: 'Hồng Trà Sữa LG', price: 35000, stock: 100, emoji: '🧋', sold: 0 },
        { id: 102, name: 'Cà Phê Muối Paradigm', price: 45000, stock: 50, emoji: '☕', sold: 0 },
        { id: 103, name: 'Trà Nhãn Sen Vàng', price: 55000, stock: 30, emoji: '🍹', sold: 0 },
        { id: 104, name: 'Bánh Mousse Việt Quất', price: 65000, stock: 20, emoji: '🍰', sold: 0 }
    ];
    let cart = [];
    let history = JSON.parse(localStorage.getItem('LGS_HIST')) || [];
    let currentMethod = 'Tiền mặt';

    // --- ĐIỀU HƯỚNG ---
    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'reports') initChart();
        if(id === 'inventory') renderInventory();
    }

    // --- POS LOGIC ---
    function renderProducts() {
        const grid = document.getElementById('product-list');
        grid.innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <span class="stock">Kho: ${p.stock}</span>
                <span class="emoji">${p.emoji}</span>
                <h3>${p.name}</h3>
                <b>${p.price.toLocaleString()} đ</b>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(p.stock <= 0) return Swal.fire('Hết hàng!', 'Món này đã hết trong kho của LGShop.', 'error');
        
        cart.push({...p});
        p.stock--;
        updateCartUI();
        renderProducts();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items');
        if(cart.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:50px; color:#94a3b8;">Giỏ hàng đang trống</div>`;
        } else {
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-item">
                    <div>
                        <b style="display:block;">${item.name}</b>
                        <small style="color:var(--primary); font-weight:700;">${item.price.toLocaleString()} đ</small>
                    </div>
                    <i class="fas fa-times-circle" style="color:var(--danger); cursor:pointer;" onclick="removeFromCart(${idx})"></i>
                </div>
            `).join('');
        }
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-val').innerText = total.toLocaleString() + ' đ';
        document.getElementById('order-id').innerText = '#' + Math.floor(Math.random()*900000 + 100000);
    }

    function removeFromCart(idx) {
        const p = products.find(x => x.id === cart[idx].id);
        p.stock++;
        cart.splice(idx, 1);
        updateCartUI();
        renderProducts();
    }

    function setMethod(m) {
        currentMethod = m;
        document.getElementById('m-cash').classList.toggle('active', m === 'Tiền mặt');
        document.getElementById('m-qr').classList.toggle('active', m === 'Quét QR');
    }

    // --- THANH TOÁN ---
    function handlePayment() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        
        if(currentMethod === 'Quét QR') {
            document.getElementById('qr-overlay').style.display = 'flex';
            document.getElementById('qr-amount').innerText = total.toLocaleString() + ' đ';
            // Gen VietQR API giả lập
            document.getElementById('qr-gen').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=LGSHOP_POS_PAY_${total}`;
        } else {
            completeOrder();
        }
    }

    function completeOrder() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        const order = {
            id: document.getElementById('order-id').innerText,
            total: total,
            method: currentMethod,
            items: [...cart],
            time: new Date().toLocaleString('vi-VN')
        };
        
        // Cập nhật lượt bán
        cart.forEach(c => {
            const p = products.find(x => x.id === c.id);
            p.sold++;
        });

        history.push(order);
        localStorage.setItem('LGS_HIST', JSON.stringify(history));
        localStorage.setItem('LGS_PROD', JSON.stringify(products));

        document.getElementById('qr-overlay').style.display = 'none';
        Swal.fire({
            title: 'Thành công!',
            text: 'Đã in hóa đơn và hoàn tất giao dịch.',
            icon: 'success',
            timer: 1500
        });

        cart = [];
        updateCartUI();
        updateStats();
    }

    // --- BÁO CÁO & QUẢN LÝ ---
    function updateStats() {
        const rev = history.reduce((s, o) => s + o.total, 0);
        const qrCount = history.filter(o => o.method === 'Quét QR').length;
        
        document.getElementById('st-rev').innerText = rev.toLocaleString() + ' đ';
        document.getElementById('st-orders').innerText = history.length;
        document.getElementById('st-qr').innerText = qrCount;
        
        let hotItem = products.reduce((prev, current) => (prev.sold > current.sold) ? prev : current);
        document.getElementById('st-hot').innerText = hotItem.sold > 0 ? hotItem.name : '--';
    }

    function renderInventory() {
        const container = document.getElementById('inv-table-container');
        container.innerHTML = `
            <table style="width:100%; border-collapse:collapse; background:white; border-radius:20px; overflow:hidden;">
                <thead style="background:#f1f5f9; text-align:left;">
                    <tr>
                        <th style="padding:20px;">Sản phẩm</th>
                        <th>Giá bán</th>
                        <th>Tồn kho</th>
                        <th>Đã bán</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    ${products.map(p => `
                        <tr style="border-bottom:1px solid #f1f5f9;">
                            <td style="padding:20px;"><b>${p.emoji} ${p.name}</b></td>
                            <td>${p.price.toLocaleString()} đ</td>
                            <td style="color:${p.stock < 10 ? 'red' : 'inherit'}; font-weight:800;">${p.stock}</td>
                            <td>${p.sold}</td>
                            <td><button onclick="editStock(${p.id})" style="border:none; color:var(--primary); background:none; cursor:pointer; font-weight:700;">Nhập hàng</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function editStock(id) {
        Swal.fire({
            title: 'Nhập hàng',
            input: 'number',
            inputLabel: 'Số lượng nhập thêm vào LGShop',
            showCancelButton: true
        }).then(res => {
            if(res.value) {
                const p = products.find(x => x.id === id);
                p.stock += parseInt(res.value);
                localStorage.setItem('LGS_PROD', JSON.stringify(products));
                renderInventory();
                renderProducts();
            }
        });
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(window.lgChart) window.lgChart.destroy();
        window.lgChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: products.map(p => p.name),
                datasets: [{
                    label: 'Lượt bán chạy',
                    data: products.map(p => p.sold),
                    backgroundColor: '#6366f1',
                    borderRadius: 10
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function updateClock() {
        document.getElementById('timer').innerText = new Date().toLocaleTimeString('vi-VN');
    }

    function resetSystem() {
        localStorage.clear();
        location.reload();
    }

    // --- KHỞI CHẠY ---
    renderProducts();
    updateCartUI();
    updateStats();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
