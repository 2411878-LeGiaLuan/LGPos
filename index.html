<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MURTHELP | THE LAST STAND</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff3c3c; --black: #050505; --panel: #0d0d0d; --gold: #facc15; --glass: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        header { 
            height: 70px; background: #000; border-bottom: 2px solid var(--red); 
            display: flex; align-items: center; padding: 0 25px; gap: 20px; z-index: 1001; position: relative;
        }
        .menu-btn { font-size: 26px; cursor: pointer; color: var(--red); }
        .wrapper { display: flex; height: calc(100vh - 70px); position: relative; }

        /* SIDEBAR */
        aside.sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid #222;
            transition: 0.4s; overflow: hidden; display: flex; flex-direction: column;
        }
        aside.sidebar.collapsed { width: 0; border: none; }
        .nav-item { 
            padding: 22px; border-bottom: 1px solid #1a1a1a; cursor: pointer; white-space: nowrap;
            transition: 0.3s; display: flex; align-items: center; gap: 15px; font-weight: bold;
        }
        .nav-item:hover { background: #1a1a1a; color: var(--red); padding-left: 30px; }

        /* MAIN VIEW */
        main.viewport { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top, #111, #050505); }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        /* VŨ KHÍ CARD - FIX ẢNH */
        .w-card { 
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; 
            text-align: center; transition: 0.3s; position: relative;
        }
        .w-card:hover { border-color: var(--red); transform: translateY(-5px); box-shadow: 0 0 20px rgba(255,60,60,0.2); }
        .w-img-box { 
            width: 100%; height: 150px; background: #000; border-radius: 8px; margin-bottom: 12px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .w-img-box img { width: 95%; height: 95%; object-fit: contain; }

        /* DOANH THU DASHBOARD */
        .boss-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--panel); padding: 30px; border-radius: 15px; border-top: 4px solid var(--red); box-shadow: 0 10px 30px #000; }
        .stat-card h1 { font-size: 35px; color: var(--gold); margin-top: 10px; }

        /* GIỎ HÀNG FLOATING (IPHONE 15) */
        #cart-panel {
            position: fixed; right: 20px; bottom: 20px; width: 380px; max-height: 60vh;
            background: #0d0d0d; border: 2px solid var(--red); border-radius: 20px;
            display: flex; flex-direction: column; z-index: 1000; transition: 0.5s;
        }
        #cart-panel.hidden { transform: translateX(450px); }
        .cart-header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }

        @media (max-width: 768px) {
            #cart-panel { width: calc(100% - 40px); left: 20px; bottom: 20px; }
            .sidebar { position: absolute; z-index: 1002; height: 100%; box-shadow: 50px 0 100px #000; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; color: #000; padding: 40px; border-radius: 25px; width: 90%; max-width: 450px; text-align: center; }
        .btn-pay { width: 100%; padding: 18px; background: var(--red); color: #fff; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
        <div style="font-family:'Syncopate'; font-size:22px; color:var(--red); letter-spacing:3px;">MURTHELP.OS</div>
        <div style="margin-left: auto; font-size: 14px;">COMMANDER: <span style="color:var(--gold)">GIA LUÂN</span></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="nav-item" onclick="showTab('arsenal')"><i class="fas fa-crosshairs"></i> VŨ KHÍ TẬN THẾ</div>
            <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-chart-pie"></i> DOANH THU & KHO</div>
            <div class="nav-item" onclick="showTab('vips')"><i class="fas fa-skull"></i> DANH SÁCH WARLORDS</div>
            <div class="nav-item" style="margin-top:auto; color:#444;" onclick="location.reload()"><i class="fas fa-power-off"></i> LOGOUT SYSTEM</div>
        </aside>

        <main class="viewport">
            <div id="tab-arsenal" class="tab-content">
                <h2 style="margin-bottom:25px; font-family:'Syncopate'; color:var(--gold)">ARMS DEALER LIST</h2>
                <div class="weapon-grid" id="weapon-list"></div>
            </div>

            <div id="tab-boss" class="tab-content" style="display:none;">
                <h2 style="margin-bottom:25px; font-family:'Syncopate'; color:var(--red)">COMMANDER DASHBOARD</h2>
                <div class="boss-stats">
                    <div class="stat-card"><small>TỔNG DOANH THU (USD)</small><h1 id="total-rev">$0</h1></div>
                    <div class="stat-card"><small>ĐƠN HÀNG THÀNH CÔNG</small><h1 style="color:#fff" id="order-count">0</h1></div>
                </div>
                <div style="background:var(--panel); padding:25px; border-radius:15px;">
                    <h3>LỊCH SỬ GIAO DỊCH GẦN ĐÂY</h3>
                    <div id="history-list" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="tab-vips" class="tab-content" style="display:none;">
                <h2 style="margin-bottom:25px; font-family:'Syncopate'; color:var(--red)">TOP WARLORDS</h2>
                <div id="vip-list-container" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px;"></div>
            </div>
        </main>
    </div>

    <div id="cart-panel">
        <div class="cart-header">
            <b style="color:var(--red)">LOADOUT SELECTION</b>
            <i class="fas fa-chevron-down" onclick="toggleCart()" style="cursor:pointer"></i>
        </div>
        <div class="cart-items" id="cart-data"></div>
        <div style="padding:20px; background:#111; border-radius: 0 0 20px 20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:20px; font-weight:bold">
                <span>TOTAL:</span>
                <span id="cart-total" style="color:var(--gold)">$0</span>
            </div>
            <button class="btn-pay" onclick="openPayment()">EXECUTE PURCHASE</button>
        </div>
    </div>

    <div id="cart-trigger" onclick="toggleCart()" style="position:fixed; bottom:30px; right:30px; width:65px; height:65px; background:var(--red); border-radius:50%; display:none; align-items:center; justify-content:center; z-index:999; box-shadow: 0 0 20px var(--red);">
        <i class="fas fa-shopping-cart" style="font-size:24px"></i>
    </div>

    <div id="pay-modal" class="modal">
        <div class="modal-box">
            <h2 style="font-family:'Syncopate'; margin-bottom:10px;">SECURE PAYMENT</h2>
            <div id="qrcode" style="display:flex; justify-content:center; margin:25px 0;"></div>
            <h1 id="vnd-total" style="color:var(--red); font-size:35px;">0 VNĐ</h1>
            <p style="color:#666; font-size:12px; margin-bottom:20px;">TRANS_ID: <span id="trans-id"></span></p>
            <button class="btn-pay" onclick="confirmSuccess()">CONFIRM PAYMENT</button>
            <button class="btn-pay" style="background:#ddd; color:#000" onclick="closePayment()">CANCEL</button>
        </div>
    </div>

<script>
    // 1. DATA VŨ KHÍ (LINK ẢNH THẬT 100%)
    const weapons = [
        { id:1, name:"AK-47 Assault Rifle", price:3500, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/AK-47_type_II_no_BG.png/640px-AK-47_type_II_no_BG.png" },
        { id:2, name:"Desert Eagle .50 AE", price:1800, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Desert_Eagle_I.jpg/640px-Desert_Eagle_I.jpg" },
        { id:3, name:"Barrett M82 Sniper", price:15000, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Barrett_M82A1_fixed_stock.png/640px-Barrett_M82A1_fixed_stock.png" },
        { id:4, name:"RPG-7 Anti-Tank", price:5000, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/RPG-7-D.png/640px-RPG-7-D.png" },
        { id:5, name:"M4A1 Carbine", price:4200, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/M4A1_noBG.png/640px-M4A1_noBG.png" }
    ];
    // Tạo thêm 100 món
    for(let i=6; i<=100; i++) {
        weapons.push({ id:i, name:`Tactical Weapon X-${i+100}`, price: Math.floor(Math.random()*8000)+1000, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Walther_P99_noBG.png/640px-Walther_P99_noBG.png" });
    }

    let cart = [];
    let revenue = 0;
    let orders = 0;

    // 2. RENDER ARSENAL
    function renderArsenal() {
        const grid = document.getElementById('weapon-list');
        grid.innerHTML = weapons.map(w => `
            <div class="w-card">
                <div class="w-img-box"><img src="${w.img}" onerror="this.src='https://via.placeholder.com/200x150/000000/ff3c3c?text=WEAPON'"></div>
                <div style="font-weight:bold; font-size:12px; height:32px; overflow:hidden;">${w.name}</div>
                <div style="color:var(--gold); font-size:18px; margin:10px 0;">$${w.price.toLocaleString()}</div>
                <button onclick="addToCart(${w.id})" style="width:100%; padding:10px; background:var(--red); border:none; color:#fff; font-weight:bold; cursor:pointer; border-radius:5px;">+ LOADOUT</button>
            </div>
        `).join('');
    }

    // 3. LOGIC GIỎ HÀNG
    function addToCart(id) {
        const item = weapons.find(w => w.id === id);
        cart.push({...item});
        updateCartUI();
        Swal.fire({ toast:true, position:'top-end', icon:'success', title:'Added to Loadout', showConfirmButton:false, timer:1000 });
    }

    function updateCartUI() {
        const container = document.getElementById('cart-data');
        container.innerHTML = cart.map((item, idx) => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:10px; border-bottom:1px solid #222; margin-bottom:10px;">
                <div style="font-size:12px;"><b>${item.name}</b></div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="color:var(--gold)">$${item.price}</span>
                    <i class="fas fa-trash" onclick="remove(${idx})" style="color:var(--red); cursor:pointer;"></i>
                </div>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
    }

    function remove(idx) { cart.splice(idx,1); updateCartUI(); }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    function toggleCart() {
        const panel = document.getElementById('cart-panel');
        const trigger = document.getElementById('cart-trigger');
        if(panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            trigger.style.display = 'none';
        } else {
            panel.classList.add('hidden');
            trigger.style.display = 'flex';
        }
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById('tab-'+tabId).style.display = 'block';
        if(window.innerWidth < 768) toggleSidebar();
        if(tabId === 'vips') renderVips();
    }

    // 4. THANH TOÁN (LOGIC TIỀN CHUẨN)
    function openPayment() {
        if(cart.length === 0) return;
        const totalUSD = cart.reduce((s, i) => s + i.price, 0);
        const totalVND = totalUSD * 25450; // Tỷ giá chuẩn
        const tid = "MH" + Math.floor(Math.random()*999999);
        
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd-total').innerText = totalVND.toLocaleString() + " VNĐ";
        document.getElementById('trans-id').innerText = tid;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${totalVND}&addInfo=${tid}`,
            width: 220, height: 220
        });
    }

    function confirmSuccess() {
        const currentTotal = cart.reduce((s, i) => s + i.price, 0);
        revenue += currentTotal;
        orders++;
        document.getElementById('total-rev').innerText = `$${revenue.toLocaleString()}`;
        document.getElementById('order-count').innerText = orders;
        
        document.getElementById('history-list').innerHTML += `<div style="padding:10px; border-bottom:1px solid #222; font-size:12px;">[SUCCESS] Transaction $${currentTotal} - ${new Date().toLocaleTimeString()}</div>`;

        Swal.fire('MISSION COMPLETE', 'Vũ khí đã sẵn sàng tại kho tập kết.', 'success');
        cart = [];
        updateCartUI();
        closePayment();
    }

    function closePayment() { document.getElementById('pay-modal').style.display = 'none'; }

    // 5. RENDER WARLORDS (DATA ĐẦY ĐỦ)
    function renderVips() {
        const vips = [
            { name: "GIA LUÂN", rank: "SUPREME COMMANDER", spend: "$9,500,000", kills: "9,999" },
            { name: "EL CHAPO JR", rank: "GENERAL", spend: "$4,200,000", kills: "1,200" },
            { name: "PHANTOM", rank: "GHOST", spend: "$2,800,000", kills: "450" }
        ];
        document.getElementById('vip-list-container').innerHTML = vips.map(v => `
            <div style="background:var(--panel); padding:25px; border-radius:15px; border-left:5px solid var(--red);">
                <h3 style="color:var(--gold)">${v.name}</h3>
                <div style="font-size:11px; margin-top:10px;">
                    <p>RANK: ${v.rank}</p>
                    <p>SPENDING: ${v.spend}</p>
                    <p>STATUS: ACTIVE</p>
                </div>
            </div>
        `).join('');
    }

    // INIT
    renderArsenal();
</script>
</body>
</html>
