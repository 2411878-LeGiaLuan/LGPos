<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGSHOP POS GALACTIC v15.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --galaxy-dark: #020617;
            --neon-blue: #38bdf8;
            --neon-purple: #8b5cf6;
            --neon-pink: #db2777;
            --success: #10b981;
            --danger: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* RESET & SCROLLBAR */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--galaxy-dark); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* GALACTIC SIDEBAR */
        .sidebar {
            width: 110px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 20px;
            z-index: 100;
        }

        .nav-link {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            gap: 5px;
            border: 1px solid transparent;
        }

        .nav-link i { font-size: 24px; }
        .nav-link span { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .nav-link:hover { color: var(--neon-blue); background: var(--glass); transform: scale(1.1); }
        .nav-link.active {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.5);
        }

        /* MAIN AREA */
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-hub {
            height: 90px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 6, 23, 0.5);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--glass);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        /* CONTENT ENGINE */
        .engine-room { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .page { display: none; height: 100%; animation: quantumIn 0.6s ease forwards; }
        .page.active { display: block; }

        @keyframes quantumIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* POS GRID */
        .pos-grid { display: grid; grid-template-columns: 1fr 480px; gap: 30px; height: 100%; }

        .menu-system { display: flex; flex-direction: column; gap: 20px; }
        .search-quantum {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .search-quantum input {
            background: none; border: none; color: white; width: 100%; font-size: 16px; font-family: inherit;
        }

        .product-warp {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding-bottom: 100px;
        }

        .p-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .p-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            opacity: 0; transition: 0.5s;
        }
        .p-card:hover { border-color: var(--neon-blue); transform: translateY(-10px); }
        .p-card:hover::before { opacity: 1; }

        .p-card .emoji { font-size: 50px; display: block; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .p-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #f8fafc; }
        .p-card .price { color: var(--neon-blue); font-weight: 900; font-size: 20px; }
        .p-card .stock-counter { 
            position: absolute; top: 15px; left: 15px; font-size: 10px; font-weight: 900; 
            background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 10px; border: 1px solid var(--neon-blue);
        }

        /* CART PANEL */
        .cart-vault {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .cart-header { padding: 30px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .cart-content { flex: 1; padding: 25px; overflow-y: auto; }

        .c-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--glass); border-radius: 20px; margin-bottom: 15px;
            border: 1px solid transparent; transition: 0.3s;
        }
        .c-item:hover { border-color: var(--neon-purple); background: rgba(139, 92, 246, 0.05); }

        .cart-footer { padding: 35px; background: rgba(2, 6, 23, 0.8); border-radius: 0 0 40px 40px; border-top: 1px solid var(--glass-border); }
        .total-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .total-box span { color: #94a3b8; font-weight: 700; }
        .total-box b { font-size: 38px; font-family: 'Orbitron', sans-serif; color: white; text-shadow: 0 0 15px var(--neon-blue); }

        .btn-launch {
            width: 100%; padding: 25px; border-radius: 25px; border: none;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white; font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.4); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-launch:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 50px rgba(56, 189, 248, 0.6); }

        /* KHO HÀNG (INVENTORY) - FIX & UPGRADE */
        .inventory-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .inventory-table th { padding: 20px; color: #94a3b8; text-align: left; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .inventory-table td { background: var(--glass); padding: 20px; border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); }
        .inventory-table td:first-child { border-left: 1px solid var(--glass-border); border-radius: 20px 0 0 20px; }
        .inventory-table td:last-child { border-right: 1px solid var(--glass-border); border-radius: 0 20px 20px 0; }

        .badge-stock { padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 12px; }
        .stock-safe { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .stock-warning { background: rgba(244, 63, 94, 0.1); color: var(--danger); animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* ANALYTICS HUD */
        .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }
        .hud-card {
            background: var(--glass); border: 1px solid var(--glass-border); padding: 30px; border-radius: 30px;
            position: relative; overflow: hidden;
        }
        .hud-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--neon-blue);
        }
        .hud-card label { color: #94a3b8; font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .hud-card h2 { font-size: 32px; font-family: 'Orbitron', sans-serif; margin-top: 10px; }

        /* QR MODAL */
        #payment-modal {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9);
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .qr-quantum {
            background: white; padding: 50px; border-radius: 40px; text-align: center; color: var(--galaxy-dark);
            width: 500px; box-shadow: 0 0 100px var(--neon-blue);
        }
        .qr-quantum img { width: 300px; height: 300px; margin: 20px 0; border: 10px solid #f1f5f9; border-radius: 20px; }

        /* CONTROLS */
        .btn-action {
            background: var(--glass); border: 1px solid var(--glass-border); color: white;
            padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-action:hover { background: var(--neon-blue); border-color: var(--neon-blue); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-link active" onclick="navigate('pos', this)">
            <i class="fas fa-rocket"></i>
            <span>Bán hàng</span>
        </div>
        <div class="nav-link" onclick="navigate('inventory', this)">
            <i class="fas fa-atom"></i>
            <span>Kho hàng</span>
        </div>
        <div class="nav-link" onclick="navigate('analytics', this)">
            <i class="fas fa-chart-pie"></i>
            <span>Dữ liệu</span>
        </div>
        <div class="nav-link" onclick="navigate('loyalty', this)">
            <i class="fas fa-crown"></i>
            <span>Vip</span>
        </div>
        <div style="margin-top: auto;">
            <div class="nav-link" onclick="resetVitals()">
                <i class="fas fa-power-off"></i>
                <span>Tắt</span>
            </div>
        </div>
    </div>

    <div class="viewport">
        
        <header class="top-hub">
            <div class="brand-logo">LGSHOP GALACTIC</div>
            <div style="display: flex; gap: 30px; align-items: center;">
                <div style="text-align: right;">
                    <div id="quantum-clock" style="font-family: 'Orbitron'; font-size: 20px; color: var(--neon-blue);">00:00:00</div>
                    <div id="quantum-date" style="font-size: 11px; font-weight: 800; color: #94a3b8;">LOADING...</div>
                </div>
                <div class="user-status">
                    <div style="width: 12px; height: 12px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success);"></div>
                    <span style="font-weight: 800; font-size: 14px;">GIA LUÂN ● COMMANDER</span>
                </div>
            </div>
        </header>

        <main class="engine-room">
            
            <section id="pos" class="page active">
                <div class="pos-grid">
                    <div class="menu-system">
                        <div class="search-quantum">
                            <i class="fas fa-search" style="color: var(--neon-blue);"></i>
                            <input type="text" id="p-search" placeholder="Truy tìm sản phẩm trong ngân hà..." onkeyup="searchEngine()">
                        </div>
                        <div class="product-warp" id="product-grid">
                            </div>
                    </div>

                    <div class="cart-vault">
                        <div class="cart-header">
                            <h2 style="font-family: 'Orbitron'; font-size: 18px; letter-spacing: 2px;">GIỎ HÀNG QUANG TỬ</h2>
                            <button class="btn-action" onclick="emptyCart()">XÓA ĐƠN</button>
                        </div>
                        <div class="cart-content" id="cart-list">
                            </div>
                        <div class="cart-footer">
                            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                                <button class="btn-action active" id="pay-cash" onclick="setPay('Cash')" style="flex: 1; border-color: var(--neon-blue);">💵 TIỀN MẶT</button>
                                <button class="btn-action" id="pay-qr" onclick="setPay('QR')" style="flex: 1;">📲 QUÉT QR</button>
                            </div>
                            <div class="total-box">
                                <span>TOTAL ENERGY</span>
                                <b id="total-price">0 đ</b>
                            </div>
                            <button class="btn-launch" onclick="launchOrder()">XUẤT HÓA ĐƠN & THANH TOÁN</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="inventory" class="page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                    <h2 style="font-family: 'Orbitron';">QUẢN TRỊ KHO HÀNG VŨ TRỤ</h2>
                    <button class="btn-launch" style="width: auto; padding: 15px 30px;" onclick="restockAll()">+ NHẬP KHO TỔNG</button>
                </div>
                <div style="background: var(--glass); padding: 30px; border-radius: 40px; border: 1px solid var(--glass-border);">
                    <table class="inventory-table" id="inventory-data">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Giá bán</th>
                                <th>Tồn kho thực tế</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="analytics" class="page">
                <div class="analytics-grid">
                    <div class="hud-card">
                        <label>Doanh thu ngân hà</label>
                        <h2 id="st-revenue">0 đ</h2>
                    </div>
                    <div class="hud-card">
                        <label>Tổng đơn hàng</label>
                        <h2 id="st-orders">0</h2>
                    </div>
                    <div class="hud-card">
                        <label>Sản phẩm Hot</label>
                        <h2 id="st-hot" style="color: var(--neon-pink);">--</h2>
                    </div>
                    <div class="hud-card">
                        <label>Hiệu suất ca</label>
                        <h2 style="color: var(--success);">98.5%</h2>
                    </div>
                </div>
                <div style="background: var(--glass); padding: 40px; border-radius: 40px; height: 500px; border: 1px solid var(--glass-border);">
                    <canvas id="galacticChart"></canvas>
                </div>
            </section>

        </main>
    </div>

    <div id="payment-modal">
        <div class="qr-quantum">
            <h1 style="font-family: 'Orbitron';">QUÉT QR ĐỂ THANH TOÁN</h1>
            <p id="qr-price" style="font-size: 24px; font-weight: 900; color: var(--neon-purple); margin-top: 10px;"></p>
            <img id="qr-image" src="" alt="QR Payment">
            <p style="color: #64748b; margin-bottom: 30px;">Hệ thống đang chờ xác nhận từ ngân hàng...</p>
            <button class="btn-launch" onclick="finalizeOrder()">XÁC NHẬN ĐÃ THU TIỀN</button>
        </div>
    </div>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/button-21.mp3"></audio>
    <audio id="snd-success" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
    /**
     * LGSHOP GALACTIC CORE ENGINE v15.0
     * Coded by Gemini for Gia Luân
     */

    // --- CORE DATA ---
    const INITIAL_PRODUCTS = [
        { id: 1, name: 'Hồng Trà Super Nova', price: 35000, stock: 100, sold: 0, emoji: '☄️', category: 'Drink' },
        { id: 2, name: 'Cà Phê Tinh Vân', price: 45000, stock: 50, sold: 0, emoji: '🌌', category: 'Drink' },
        { id: 3, name: 'Trà Sữa Hố Đen', price: 55000, stock: 30, sold: 0, emoji: '🕳️', category: 'Drink' },
        { id: 4, name: 'Bánh Mì Thiên Thạch', price: 25000, stock: 20, sold: 0, emoji: '🪨', category: 'Food' },
        { id: 5, name: 'Soda Ánh Trăng', price: 40000, stock: 40, sold: 0, emoji: '🌙', category: 'Drink' },
        { id: 6, name: 'Mousse Sao Hỏa', price: 60000, stock: 15, sold: 0, emoji: '🍰', category: 'Food' }
    ];

    let products = JSON.parse(localStorage.getItem('LG_GALACTIC_PRODUCTS')) || INITIAL_PRODUCTS;
    let cart = [];
    let history = JSON.parse(localStorage.getItem('LG_GALACTIC_HISTORY')) || [];
    let currentMethod = 'Cash';

    // --- INITIALIZATION ---
    function init() {
        renderProducts();
        updateDisplay();
        startClock();
        console.log("LGShop Galactic Engine... Online.");
    }

    // --- NAVIGATION ---
    function navigate(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');

        if(pageId === 'inventory') renderInventory();
        if(pageId === 'analytics') renderAnalytics();
        playSound('snd-click');
    }

    // --- POS ENGINE ---
    function renderProducts() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <div class="stock-counter">${p.stock} LEFT</div>
                <span class="emoji">${p.emoji}</span>
                <h3>${p.name}</h3>
                <div class="price">${p.price.toLocaleString()} đ</div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(p.stock <= 0) {
            Swal.fire('KHO CẠN KIỆT!', 'Nguyên liệu món này đã hết sạch trong ngân hà.', 'error');
            return;
        }
        cart.push({...p});
        p.stock--;
        updateCartUI();
        playSound('snd-click');
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        if(cart.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding-top:100px; color:#64748b; font-weight:800;">VAULT IS EMPTY</div>`;
        } else {
            list.innerHTML = cart.map((item, idx) => `
                <div class="c-item">
                    <div>
                        <b style="display:block;">${item.name}</b>
                        <small style="color: var(--neon-blue); font-weight:800;">${item.price.toLocaleString()} đ</small>
                    </div>
                    <i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="removeFromCart(${idx})"></i>
                </div>
            `).join('');
        }
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-price').innerText = total.toLocaleString() + ' đ';
    }

    function removeFromCart(idx) {
        const p = products.find(x => x.id === cart[idx].id);
        p.stock++;
        cart.splice(idx, 1);
        updateCartUI();
        renderProducts();
    }

    function emptyCart() {
        cart.forEach(item => {
            const p = products.find(x => x.id === item.id);
            p.stock++;
        });
        cart = [];
        updateCartUI();
        renderProducts();
    }

    function setPay(m) {
        currentMethod = m;
        document.getElementById('pay-cash').style.borderColor = m === 'Cash' ? 'var(--neon-blue)' : 'var(--glass-border)';
        document.getElementById('pay-qr').style.borderColor = m === 'QR' ? 'var(--neon-blue)' : 'var(--glass-border)';
    }

    function launchOrder() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        
        if(currentMethod === 'QR') {
            document.getElementById('payment-modal').style.display = 'flex';
            document.getElementById('qr-price').innerText = total.toLocaleString() + ' đ';
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=LGSHOP_GALACTIC_${Date.now()}_${total}`;
        } else {
            finalizeOrder();
        }
    }

    function finalizeOrder() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        const order = {
            id: 'ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase(),
            total,
            items: [...cart],
            time: new Date().toLocaleString('vi-VN'),
            method: currentMethod
        };

        // Update sold counts
        cart.forEach(c => {
            const p = products.find(x => x.id === c.id);
            p.sold++;
        });

        history.push(order);
        saveData();

        document.getElementById('payment-modal').style.display = 'none';
        Swal.fire({
            title: 'GIAO DỊCH THÀNH CÔNG',
            text: 'Hóa đơn đã được lưu vào lịch sử ngân hà.',
            icon: 'success',
            background: '#0f172a',
            color: '#fff'
        });

        cart = [];
        updateCartUI();
        updateDisplay();
        renderProducts();
        playSound('snd-success');
    }

    // --- INVENTORY ENGINE (FIXED) ---
    function renderInventory() {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = products.map(p => {
            const isLow = p.stock < 10;
            return `
                <tr>
                    <td>
                        <span style="font-size:20px; margin-right:10px;">${p.emoji}</span>
                        <b>${p.name}</b>
                    </td>
                    <td>${p.price.toLocaleString()} đ</td>
                    <td>
                        <b style="font-size:18px;">${p.stock}</b>
                    </td>
                    <td>
                        <span class="badge-stock ${isLow ? 'stock-warning' : 'stock-safe'}">
                            ${isLow ? '⚠️ CẠN KIỆT' : '✔️ AN TOÀN'}
                        </span>
                    </td>
                    <td>
                        <button class="btn-action" onclick="restockItem(${p.id})">NHẬP THÊM</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function restockItem(id) {
        Swal.fire({
            title: 'NHẬP KHO BỔ SUNG',
            input: 'number',
            inputLabel: 'Số lượng vật chất nạp thêm',
            background: '#0f172a',
            color: '#fff',
            showCancelButton: true
        }).then(res => {
            if(res.isConfirmed && res.value) {
                const p = products.find(x => x.id === id);
                p.stock += parseInt(res.value);
                saveData();
                renderInventory();
                renderProducts();
            }
        });
    }

    function restockAll() {
        products.forEach(p => p.stock += 50);
        saveData();
        renderInventory();
        renderProducts();
        Swal.fire('REFILLED!', 'Toàn bộ kho hàng đã được nạp thêm 50 đơn vị.', 'success');
    }

    // --- ANALYTICS HUB ---
    function renderAnalytics() {
        updateDisplay();
        const ctx = document.getElementById('galacticChart').getContext('2d');
        
        if(window.gChart) window.gChart.destroy();
        
        window.gChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: products.map(p => p.name),
                datasets: [{
                    label: 'SẢN LƯỢNG TIÊU THỤ',
                    data: products.map(p => p.sold),
                    backgroundColor: ['#38bdf8', '#8b5cf6', '#db2777', '#10b981', '#f59e0b', '#6366f1'],
                    borderRadius: 15
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    function updateDisplay() {
        const revenue = history.reduce((s, o) => s + o.total, 0);
        document.getElementById('st-revenue').innerText = revenue.toLocaleString() + ' đ';
        document.getElementById('st-orders').innerText = history.length;
        
        const hotItem = products.reduce((prev, curr) => (prev.sold > curr.sold) ? prev : curr);
        document.getElementById('st-hot').innerText = hotItem.sold > 0 ? hotItem.name : '--';
    }

    // --- UTILS ---
    function saveData() {
        localStorage.setItem('LG_GALACTIC_PRODUCTS', JSON.stringify(products));
        localStorage.setItem('LG_GALACTIC_HISTORY', JSON.stringify(history));
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('quantum-clock').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('quantum-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
        }, 1000);
    }

    function searchEngine() {
        const term = document.getElementById('p-search').value.toLowerCase();
        const cards = document.querySelectorAll('.p-card');
        cards.forEach(card => {
            const name = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = name.includes(term) ? 'block' : 'none';
        });
    }

    function playSound(id) {
        const audio = document.getElementById(id);
        audio.currentTime = 0;
        audio.play().catch(() => {});
    }

    function resetVitals() {
        Swal.fire({
            title: 'TẮT HỆ THỐNG?',
            text: "Dữ liệu sẽ được lưu trữ vào bộ nhớ đám mây.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'XÁC NHẬN'
        }).then(res => {
            if(res.isConfirmed) {
                localStorage.clear();
                location.reload();
            }
        });
    }

    // IGNITE THE ENGINE
    init();

</script>
</body>
</html>
