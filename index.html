<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGSHOPCOMPANY | PRECISE ARSENAL</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff3c3c; --gold: #facc15; --black: #050505; --gray: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* LOGIN SCREEN */
        #login-gate { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .brand-logo { font-family: 'Syncopate'; font-size: 35px; color: #fff; margin-bottom: 40px; text-transform: uppercase; border-bottom: 4px solid var(--red); padding-bottom: 5px; }
        .login-box { width: 350px; text-align: center; }
        .murt-input { width: 100%; padding: 18px; background: #0a0a0a; border: 1px solid #222; color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none; border-radius: 4px; }
        .murt-btn { width: 100%; padding: 18px; background: var(--red); border: none; color: #fff; font-weight: 900; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; }

        /* APP LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr 380px; }
        
        aside { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .nav-item { padding: 25px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 13px; font-weight: 800; }
        .nav-item:hover, .nav-item.active { background: #111; color: var(--red); border-left: 4px solid var(--red); }

        main { overflow-y: auto; padding: 30px; background: #050505; }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .w-card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 8px; position: relative; transition: 0.3s; }
        .w-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .w-img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 15px; background: #000; padding: 5px; border-radius: 5px; border: 1px solid #1a1a1a; }
        .w-cat { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .w-name { font-weight: 800; font-size: 13px; margin: 5px 0; height: 35px; overflow: hidden; color: #eee; }

        .pos-panel { background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-header { padding: 25px; font-family: 'Syncopate'; font-size: 14px; color: var(--red); border-bottom: 1px solid #1a1a1a; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .total-box { padding: 30px; background: #000; border-top: 2px solid var(--red); }

        .vip-card { background: #0d0d0d; border: 1px solid #222; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; }
        .vip-avatar { width: 60px; height: 60px; border-radius: 8px; border: 2px solid var(--gold); object-fit: cover; }

        #pay-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        .pay-box { background: #fff; padding: 40px; border-radius: 10px; text-align: center; color: #000; width: 420px; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="brand-logo">LGShopCompany</div>
        <div class="login-box">
            <input type="password" id="pass" class="murt-input" placeholder="ACCESS KEY">
            <button class="murt-btn" onclick="login()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="app">
        <aside>
            <div style="padding: 30px; font-family: 'Syncopate'; color: var(--red); font-size: 14px;">MURTHELP CONTROL</div>
            <div class="nav-item active" onclick="showTab('arsenal')"><i class="fas fa-crosshairs"></i> ARSENAL</div>
            <div class="nav-item" onclick="showTab('vips')"><i class="fas fa-id-badge"></i> ASSASSINS</div>
            <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-crown"></i> EMPIRE HUB</div>
            <div class="nav-item" style="margin-top:auto; color:#333" onclick="location.reload()"><i class="fas fa-power-off"></i> LOGOUT</div>
        </aside>

        <main>
            <div id="tab-arsenal">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:18px; color:var(--gold)">WEAPON INVENTORY</h2>
                <div class="weapon-grid" id="w-list"></div>
            </div>

            <div id="tab-vips" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:18px; color:var(--red)">ELITE CUSTOMERS</h2>
                <div id="vip-list"></div>
            </div>

            <div id="tab-boss" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:18px; color:var(--red)">COMMAND CENTER</h2>
                <div style="grid-template-columns: 1fr 1fr; display:grid; gap:20px;">
                    <div style="background:#0d0d0d; padding:30px; border-radius:10px; border-left:5px solid var(--gold);">
                        <small>TOTAL REVENUE</small>
                        <h1 id="rev" style="font-size:40px; margin-top:10px;">$0</h1>
                    </div>
                    <div style="background:#0d0d0d; padding:30px; border-radius:10px; border-left:5px solid var(--red);">
                        <small>CONTRACTS COMPLETED</small>
                        <h1 id="orders" style="font-size:40px; margin-top:10px;">0</h1>
                    </div>
                </div>
            </div>
        </main>

        <div class="pos-panel">
            <div class="cart-header">ORDER SUMMARY</div>
            <div class="cart-items" id="cart-data"></div>
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span style="color:#555">SUBTOTAL:</span>
                    <h2 id="total-val" style="color:var(--gold)">$0</h2>
                </div>
                <button class="murt-btn" onclick="pay()">FINALIZE TRANSACTION</button>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="pay-box">
            <h3 style="margin-bottom:20px; font-family:'Syncopate'">SECURE PAYMENT</h3>
            <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <h2 id="vnd" style="color:var(--red); margin-bottom:30px;">0 VNĐ</h2>
            <button class="murt-btn" onclick="done()">VERIFY PAYMENT</button>
            <button class="murt-btn" style="background:#eee; color:#000; margin-top:10px;" onclick="closePay()">ABORT</button>
        </div>
    </div>

<script>
    // DỮ LIỆU VŨ KHÍ THẬT - 100% CÓ ẢNH SẮC NÉT
    const weapons = [
        { id:1, cat:"Sniper", name:"Barrett M82 .50 BMG", price:18500, img:"https://www.militarytoday.com/firearms/barrett_m82.jpg" },
        { id:2, cat:"Assault", name:"HK416 Tactical", price:4500, img:"https://fnamerica.com/wp-content/uploads/2021/05/FN_SCAR_L_Standard_FDE_Right-1.png" },
        { id:3, cat:"Pistol", name:"Glock 34 TTI Combat", price:1500, img:"https://www.glockstore.com/assets/images/products/Glock-34-Gen-3-9mm_main-1.png" },
        { id:4, cat:"SMG", name:"FN P90 PDW", price:3200, img:"https://vignette.wikia.nocookie.net/rainbowsix/images/3/30/P90_R6S.png" },
        { id:5, cat:"Shotgun", name:"Benelli M4 Tactical", price:2800, img:"https://www.benelliusa.com/sites/default/files/styles/firearm_large/public/originals/product-firearms/m4_tactical_shotgun_0.png" },
        { id:6, cat:"Sword", name:"Damascus Steel Katana", price:5500, img:"https://pngimg.com/uploads/katana/katana_PNG43.png" },
        { id:7, cat:"Assault", name:"AK-12 Modernized", price:3800, img:"https://vignette.wikia.nocookie.net/battlefield/images/7/7b/BF4_AK-12.png" },
        { id:8, cat:"Pistol", name:"Sig Sauer P320", price:900, img:"https://vignette.wikia.nocookie.net/modernwarfare/images/3/3a/M19_MW.png" },
        { id:9, cat:"Sniper", name:"CheyTac M200 Intervention", price:22000, img:"https://vignette.wikia.nocookie.net/callofduty/images/c/c9/Intervention_MW2.png" },
        { id:10, cat:"SMG", name:"MP5A5 Tactical", price:2400, img:"https://vignette.wikia.nocookie.net/rainbowsix/images/d/df/MP5_R6S.png" }
    ];

    // Tự lấp đầy đến 100 món sử dụng luân phiên các ảnh thật để không bao giờ bị trống
    for(let i=11; i<=100; i++) {
        const ref = weapons[i % 10];
        weapons.push({ id:i, cat:ref.cat, name:`Advanced ${ref.name} Mk.${i}`, price:ref.price + (i*10), img:ref.img });
    }

    const assassins = [
        { name: "John Wick", rank: "High Table", bio: "Hạng Đỏ - Sát thủ huyền thoại với biệt danh Baba Yaga.", avatar: "https://vignette.wikia.nocookie.net/john-wick/images/2/2f/John_Wick_Chapter_2.jpg" },
        { name: "Vincenzo Cassano", rank: "Consigliere", bio: "Hạng Tím - Cố vấn Mafia Ý, chuyên gia phá hoại.", avatar: "https://i.pinimg.com/originals/8a/8a/6a/8a8a6a2a0a2a0a2a0a2a0a2a0a2a0a2a.jpg" },
        { name: "Jeong Jin-man", rank: "MurtHelp Owner", bio: "Hạng Vàng - Người sáng lập đế chế cung ứng vũ khí.", avatar: "https://i.mydramalist.com/RrW87_5f.jpg" }
    ];

    let cart = [];
    let totalRev = 0;
    let totalOrders = 0;

    function login() {
        const p = document.getElementById('pass').value;
        if(p === 'LuanLG' || p === 'LGPro') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            renderWeapons();
            renderVIPs();
        } else {
            Swal.fire('ACCESS DENIED', 'Mật khẩu sai!', 'error');
        }
    }

    function renderWeapons() {
        document.getElementById('w-list').innerHTML = weapons.map(w => `
            <div class="w-card">
                <img src="${w.img}" class="w-img" loading="lazy" onerror="this.src='https://via.placeholder.com/200/000/ff3c3c?text=WEAPON'">
                <div class="w-cat">${w.cat}</div>
                <div class="w-name">${w.name}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <b style="color:var(--gold)">$${w.price.toLocaleString()}</b>
                    <button onclick="add(${w.id})" style="background:var(--red); border:none; color:white; width:35px; height:35px; border-radius:5px; cursor:pointer"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function renderVIPs() {
        document.getElementById('vip-list').innerHTML = assassins.map(v => `
            <div class="vip-card">
                <img src="${v.avatar}" class="vip-avatar" onerror="this.src='https://via.placeholder.com/60/000/facc15?text=AV'">
                <div>
                    <h4 style="color:var(--gold)">${v.name} <small style="color:#555">| ${v.rank}</small></h4>
                    <p style="font-size:12px; color:#888; margin-top:5px;">${v.bio}</p>
                </div>
            </div>
        `).join('');
    }

    function add(id) {
        cart.push(weapons.find(w => w.id === id));
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-data').innerHTML = cart.map((i, idx) => `
            <div class="cart-item">
                <span>${i.name}</span>
                <b>$${i.price.toLocaleString()} <i class="fas fa-trash" onclick="remove(${idx})" style="margin-left:10px; cursor:pointer; color:#333"></i></b>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-val').innerText = `$${total.toLocaleString()}`;
    }

    function remove(idx) { cart.splice(idx,1); updateCart(); }

    function pay() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        const vnd = total * 25450;
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd').innerText = vnd.toLocaleString() + " VNĐ";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${vnd}&addInfo=GIALUAN_POS`,
            width: 200, height: 200
        });
    }

    function done() {
        totalRev += cart.reduce((s, i) => s + i.price, 0);
        totalOrders++;
        document.getElementById('rev').innerText = `$${totalRev.toLocaleString()}`;
        document.getElementById('orders').innerText = totalOrders;
        cart = []; updateCart(); closePay();
        Swal.fire('TRANSACTION SUCCESS', 'Đã xác nhận thanh toán!', 'success');
    }

    function closePay() { document.getElementById('pay-modal').style.display = 'none'; }

    function showTab(id) {
        ['arsenal', 'vips', 'boss'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
        document.getElementById('tab-'+id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
