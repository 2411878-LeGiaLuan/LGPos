<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGSHOP MULTIVERSE OS v20.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --danger-neon: #ff0055;
            --glass-white: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* NEURAL SIDEBAR */
        .sidebar {
            width: 100px;
            background: rgba(10, 10, 10, 0.9);
            border-right: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            gap: 35px;
            backdrop-filter: blur(20px);
            z-index: 1000;
        }

        .nav-item {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: #444;
            transition: 0.5s;
            background: var(--glass-white);
        }

        .nav-item i { font-size: 22px; }
        .nav-item:hover, .nav-item.active {
            color: var(--primary-neon);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 20px var(--border-glow);
        }

        .nav-item span {
            position: absolute; left: 80px; background: var(--primary-neon); color: #000;
            padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .nav-item:hover span { opacity: 1; left: 110px; }

        /* MAIN MULTIVERSE CONTAINER */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* HYPER HEADER */
        .hyper-header {
            height: 100px;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
        }

        .os-brand {
            font-family: 'Syncopate', sans-serif;
            font-size: 24px;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GRID SYSTEM */
        .content-area { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; animation: portalIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page.active { display: block; }

        @keyframes portalIn {
            from { opacity: 0; transform: scale(1.1) rotateX(10deg); filter: blur(20px); }
            to { opacity: 1; transform: scale(1) rotateX(0); filter: blur(0); }
        }

        /* MODERN POS INTERFACE */
        .pos-interface { display: grid; grid-template-columns: 1fr 450px; gap: 40px; height: 100%; }
        
        .product-nebula {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .nebula-card {
            background: var(--glass-white);
            border: 1px solid var(--border-glow);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .nebula-card:hover {
            transform: translateY(-10px);
            background: rgba(0, 242, 255, 0.05);
            border-color: var(--primary-neon);
        }
        .nebula-card .stock { position: absolute; top: 15px; right: 15px; font-size: 10px; color: var(--primary-neon); }

        /* VIP SECTION (FIXED & UPGRADED) */
        .vip-portal {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .vip-card {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 242, 255, 0.1));
            border: 1px solid var(--secondary-neon);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
        }
        .rank-badge {
            width: 80px; height: 80px; border-radius: 50%; background: var(--secondary-neon);
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--secondary-neon);
        }

        /* INVENTORY QUANTUM TABLE */
        .quantum-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
        }
        .quantum-table th { color: var(--primary-neon); text-transform: uppercase; letter-spacing: 2px; padding: 20px; text-align: left; }
        .quantum-table td { background: var(--glass-white); padding: 25px; border-top: 1px solid var(--border-glow); border-bottom: 1px solid var(--border-glow); }
        .quantum-table td:first-child { border-left: 1px solid var(--border-glow); border-radius: 20px 0 0 20px; }
        .quantum-table td:last-child { border-right: 1px solid var(--border-glow); border-radius: 0 20px 20px 0; }

        /* BUTTONS */
        .hyper-btn {
            background: transparent;
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 15px 30px;
            border-radius: 12px;
            font-family: 'Syncopate';
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .hyper-btn:hover { background: var(--primary-neon); color: #000; box-shadow: 0 0 30px var(--primary-neon); }

        /* CART FLOATING SYSTEM */
        .cart-console {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(30px);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="nav('pos', this)"><i class="fas fa-terminal"></i><span>Bán hàng</span></div>
        <div class="nav-item" onclick="nav('inventory', this)"><i class="fas fa-microchip"></i><span>Kho hàng</span></div>
        <div class="nav-item" onclick="nav('vip', this)"><i class="fas fa-crown"></i><span>Hệ VIP</span></div>
        <div class="nav-item" onclick="nav('data', this)"><i class="fas fa-project-diagram"></i><span>Dữ liệu</span></div>
    </div>

    <div class="main-container">
        <header class="hyper-header">
            <div class="os-brand">LGSHOP MULTIVERSE v20.0</div>
            <div style="display: flex; gap: 40px; align-items: center;">
                <div id="clock" style="font-family: 'Syncopate'; color: var(--primary-neon); font-size: 20px;">00:00:00</div>
                <div class="hyper-btn" onclick="syncMultiverse()">ĐỒNG BỘ ĐA VŨ TRỤ</div>
            </div>
        </header>

        <main class="content-area">
            <section id="pos" class="page active">
                <div class="pos-interface">
                    <div class="product-nebula" id="product-list">
                        </div>
                    <div class="cart-console">
                        <h2 style="font-family: 'Syncopate'; margin-bottom: 30px; font-size: 16px;">GIỎ HÀNG QUANG TỬ</h2>
                        <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
                        <div style="border-top: 1px solid var(--border-glow); padding-top: 30px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                                <span>TỔNG NĂNG LƯỢNG:</span>
                                <b id="total-val" style="color:var(--primary-neon); font-size: 24px;">0 đ</b>
                            </div>
                            <button class="hyper-btn" style="width:100%; height:70px; font-size:18px;" onclick="checkout()">PHÁT HÀNH HÓA ĐƠN</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="vip" class="page">
                <h1 style="font-family: 'Syncopate'; margin-bottom: 50px;">BẢNG XẾP HẠNG THỰC THỂ VIP</h1>
                <div class="vip-portal" id="vip-list">
                    </div>
            </section>

            <section id="inventory" class="page">
                <h1 style="font-family: 'Syncopate'; margin-bottom: 50px;">QUẢN TRỊ KHO NGUYÊN TỬ</h1>
                <table class="quantum-table">
                    <thead>
                        <tr>
                            <th>Thực thể</th>
                            <th>Mật độ kho</th>
                            <th>Trạng thái rủi ro</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </section>
        </main>
    </div>

<script>
    // --- MULTIVERSE DATABASE ---
    let db = {
        products: [
            { id: 1, name: 'Hồng Trà Super Nova', price: 35000, stock: 120, img: '☄️' },
            { id: 2, name: 'Cà Phê Tinh Vân', price: 45000, stock: 50, img: '🌌' },
            { id: 3, name: 'Soda Lỗ Đen', price: 55000, stock: 15, img: '🕳️' },
            { id: 4, name: 'Bánh Mì Thiên Thạch', price: 25000, stock: 5, img: '🪨' }
        ],
        vips: [
            { name: 'Gia Luân', rank: 'GOD-LEVEL', points: 999999, color: 'var(--primary-neon)' },
            { name: 'Khách Ẩn Danh', rank: 'MASTER', points: 15400, color: 'var(--secondary-neon)' },
            { name: 'Thực thể 003', rank: 'MEMBER', points: 200, color: '#fff' }
        ],
        cart: [],
        history: []
    };

    // --- CORE ENGINES ---
    function init() {
        renderProducts();
        renderVIPs();
        renderInventory();
        startQuantumClock();
    }

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(page).classList.add('active');
        el.classList.add('active');
    }

    function renderProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = db.products.map(p => `
            <div class="nebula-card" onclick="addToCart(${p.id})">
                <div class="stock">Q-STOCK: ${p.stock}</div>
                <div style="font-size: 60px; margin-bottom:20px;">${p.img}</div>
                <h3 style="margin-bottom:10px;">${p.name}</h3>
                <b style="color:var(--primary-neon)">${p.price.toLocaleString()} đ</b>
            </div>
        `).join('');
    }

    function renderVIPs() {
        const list = document.getElementById('vip-list');
        list.innerHTML = db.vips.map(v => `
            <div class="vip-card" style="border-color: ${v.color}">
                <div class="rank-badge" style="background:${v.color}">${v.rank[0]}</div>
                <h2>${v.name}</h2>
                <p style="color: ${v.color}; font-weight:900; margin-top:10px;">${v.rank}</p>
                <div style="margin-top:20px; font-size:12px;">SCORE: ${v.points}</div>
            </div>
        `).join('');
    }

    function renderInventory() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = db.products.map(p => `
            <tr>
                <td><b>${p.name}</b></td>
                <td><div style="width:${p.stock}px; height:5px; background:var(--primary-neon)"></div> ${p.stock} UNIT</td>
                <td>${p.stock < 10 ? '<span style="color:red">⚠️ RỦI RO CAO</span>' : 'ỔN ĐỊNH'}</td>
                <td><button class="hyper-btn" onclick="restock(${p.id})">NẠP NĂNG LƯỢNG</button></td>
            </tr>
        `).join('');
    }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        if(p.stock <= 0) return Swal.fire('HẾT NĂNG LƯỢNG', 'Sản phẩm không còn trong kho!', 'error');
        db.cart.push({...p});
        p.stock--;
        updateCartUI();
        renderProducts();
        renderInventory();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items');
        list.innerHTML = db.cart.map((i, idx) => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between;">
                <span>${i.name}</span>
                <i class="fas fa-times" onclick="removeItem(${idx})" style="color:red; cursor:pointer"></i>
            </div>
        `).join('');
        const total = db.cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-val').innerText = total.toLocaleString() + ' đ';
    }

    function checkout() {
        if(db.cart.length === 0) return;
        Swal.fire({
            title: 'XÁC NHẬN GIAO DỊCH',
            text: 'Dữ liệu sẽ được đẩy lên đám mây đa vũ trụ.',
            icon: 'info',
            showCancelButton: true,
            confirmButtonColor: '#7000ff',
            confirmButtonText: 'THANH TOÁN'
        }).then(result => {
            if(result.isConfirmed) {
                db.cart = [];
                updateCartUI();
                Swal.fire('THÀNH CÔNG', 'Giao dịch đã được mã hóa!', 'success');
            }
        });
    }

    function startQuantumClock() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
        }, 1000);
    }

    init();
</script>
</body>
</html>
