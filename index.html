<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGShop POS Titanium v9.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --p: #0f172a; --s: #6366f1; --success: #10b981;
            --danger: #f43f5e; --warning: #f59e0b; --glass: rgba(255, 255, 255, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1964') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* SIDEBAR GLASS */
        .sidebar { 
            width: 90px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link { 
            color: #94a3b8; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            border-radius: 18px; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link.active { background: var(--s); color: white; transform: scale(1.1); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; background: rgba(241, 245, 249, 0.7); backdrop-filter: blur(5px); }
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: var(--p); }

        .page { display: none; padding: 30px; height: calc(100vh - 85px); overflow-y: auto; animation: slideUp 0.5s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* POS INTERFACE */
        .pos-container { display: grid; grid-template-columns: 1fr 420px; gap: 30px; height: 100%; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; align-content: start; }
        
        .prod-card { 
            background: white; border-radius: 24px; padding: 25px; text-align: center; cursor: pointer;
            border: 1px solid transparent; transition: 0.3s; position: relative; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .prod-card:hover { border-color: var(--s); transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .prod-card .stock { position: absolute; top: 12px; left: 12px; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; background: #f1f5f9; }
        .prod-card .emoji { font-size: 50px; margin-bottom: 15px; display: block; }
        .prod-card h3 { font-size: 15px; font-weight: 700; color: var(--p); }
        .prod-card p { color: var(--s); font-weight: 900; margin-top: 8px; }

        /* BILLING PANEL */
        .bill-panel { background: white; border-radius: 32px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .bill-items { flex: 1; padding: 25px; overflow-y: auto; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; animation: fadeIn 0.3s ease; }
        .item-row b { font-size: 15px; }

        .checkout-box { padding: 30px; background: #f8fafc; border-radius: 0 0 32px 32px; border-top: 1px solid #e2e8f0; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .total-row span { font-size: 14px; font-weight: 700; color: #64748b; }
        .total-row b { font-size: 32px; font-weight: 900; color: var(--p); }

        .pay-methods { display: flex; gap: 10px; margin-bottom: 20px; }
        .method-btn { flex: 1; padding: 15px; border-radius: 16px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 800; font-size: 12px; transition: 0.3s; }
        .method-btn.active { border-color: var(--s); background: #eef2ff; color: var(--s); }

        .btn-confirm { 
            width: 100%; padding: 22px; border-radius: 20px; border: none; background: var(--p); color: white;
            font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-confirm:hover { background: #1e293b; transform: scale(1.02); }

        /* ANALYTICS */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 30px; }
        .s-card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .s-card small { color: #64748b; font-weight: 700; text-transform: uppercase; }
        .s-card h2 { font-size: 30px; font-weight: 900; margin-top: 10px; }

        /* MODAL QR */
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; }
        .qr-content { background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 400px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-link active" onclick="go('pos', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-link" onclick="go('tables', this)"><i class="fas fa-border-all"></i></div>
        <div class="nav-link" onclick="go('reports', this)"><i class="fas fa-analytics"></i></div>
        <div class="nav-link" onclick="go('settings', this)"><i class="fas fa-cog"></i></div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h1>LGSHOP <span style="color:var(--s)">TITANIUM</span></h1>
                <small id="clock"></small>
            </div>
            <div style="display:flex; gap:20px; align-items:center">
                <span style="font-weight:700">Hi, Gia Luân!</span>
                <div style="width:45px; height:45px; border-radius:15px; background:var(--s); color:white; display:flex; align-items:center; justify-content:center; font-weight:900">GL</div>
            </div>
        </div>

        <div id="pos" class="page active">
            <div class="pos-container">
                <div class="prod-grid" id="menu"></div>
                <div class="bill-panel">
                    <div style="padding:25px; font-weight:900; font-size:18px; border-bottom:1px solid #f1f5f9">GIỎ HÀNG</div>
                    <div class="bill-items" id="cart"></div>
                    <div class="checkout-box">
                        <div class="pay-methods">
                            <button class="method-btn active" id="m-cash" onclick="setM('Tiền mặt')">💵 TIỀN MẶT</button>
                            <button class="method-btn" id="m-qr" onclick="setM('Chuyển khoản')">📲 QUÉT QR</button>
                        </div>
                        <div class="total-row">
                            <span>TỔNG THANH TOÁN</span>
                            <b id="total-val">0 đ</b>
                        </div>
                        <button class="btn-confirm" onclick="pay()">HOÀN TẤT ĐƠN HÀNG</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="reports" class="page">
            <div class="stats">
                <div class="s-card"><small>Doanh thu LGShop</small><h2 id="r-total">0 đ</h2></div>
                <div class="s-card"><small>Đơn hàng hôm nay</small><h2 id="r-count">0</h2></div>
                <div class="s-card"><small>Sản phẩm bán chạy</small><h2 style="color:var(--s)">Hồng Trà</h2></div>
            </div>
            <div style="background:white; padding:40px; border-radius:32px; height:400px">
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </div>

    <div id="qr-modal">
        <div class="qr-content">
            <h3>THANH TOÁN QR</h3>
            <p id="qr-desc" style="margin:15px 0; color:#64748b"></p>
            <img id="qr-img" style="width:100%; border-radius:20px; margin-bottom:20px">
            <button class="btn-confirm" onclick="closeQR()">ĐÃ NHẬN ĐƯỢC TIỀN</button>
        </div>
    </div>

<script>
    // --- DATABASE ---
    let menu = [
        { id: 1, name: 'Hồng Trà Đặc Biệt', price: 30000, emoji: '🧋', stock: 50 },
        { id: 2, name: 'Cà Phê Muối LG', price: 40000, emoji: '☕', stock: 25 },
        { id: 3, name: 'Trà Nhãn Sen', price: 45000, emoji: '🍹', stock: 15 },
        { id: 4, name: 'Bánh Gấu LG', price: 20000, emoji: '🧸', stock: 10 }
    ];
    let cart = [];
    let history = JSON.parse(localStorage.getItem('LGS_H')) || [];
    let method = 'Tiền mặt';

    // --- CORE ---
    function init() {
        renderMenu();
        updateStats();
        updateClock();
        setInterval(updateClock, 1000);
    }

    function go(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'reports') renderChart();
    }

    function renderMenu() {
        document.getElementById('menu').innerHTML = menu.map(p => `
            <div class="prod-card" onclick="add(${p.id})">
                <span class="stock">KHO: ${p.stock}</span>
                <span class="emoji">${p.emoji}</span>
                <h3>${p.name}</h3>
                <p>${p.price.toLocaleString()} đ</p>
            </div>
        `).join('');
    }

    function add(id) {
        const p = menu.find(x => x.id === id);
        if(p.stock <= 0) return Swal.fire('Hết hàng', 'Món này đã hết trong kho!', 'warning');
        p.stock--;
        cart.push({...p});
        updateCart();
        renderMenu();
    }

    function updateCart() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart').innerHTML = cart.map((i, idx) => `
            <div class="item-row">
                <div><b>${i.name}</b><br><small>${i.price.toLocaleString()}</small></div>
                <i class="fas fa-trash-alt" style="color:var(--danger); cursor:pointer" onclick="remove(${idx})"></i>
            </div>
        `).join('');
        document.getElementById('total-val').innerText = total.toLocaleString() + ' đ';
    }

    function remove(idx) {
        const p = menu.find(x => x.id === cart[idx].id);
        p.stock++;
        cart.splice(idx, 1);
        updateCart();
        renderMenu();
    }

    function setM(m) {
        method = m;
        document.getElementById('m-cash').classList.toggle('active', m === 'Tiền mặt');
        document.getElementById('m-qr').classList.toggle('active', m === 'Chuyển khoản');
    }

    function pay() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        
        if(method === 'Chuyển khoản') {
            document.getElementById('qr-modal').style.display = 'flex';
            document.getElementById('qr-desc').innerText = `Số tiền: ${total.toLocaleString()} đ`;
            // Tạo VietQR API (Giả lập QR với số tiền thực tế)
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=LGSHOP_PAYMENT_${total}`;
        } else {
            finalize(total);
        }
    }

    function finalize(total) {
        history.push({ total, time: new Date().toLocaleTimeString(), method });
        localStorage.setItem('LGS_H', JSON.stringify(history));
        Swal.fire('Thành công', 'Đơn hàng đã được lưu vào hệ thống LGShop!', 'success');
        cart = [];
        updateCart();
        updateStats();
    }

    function closeQR() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('qr-modal').style.display = 'none';
        finalize(total);
    }

    function updateStats() {
        const rev = history.reduce((s, o) => s + o.total, 0);
        document.getElementById('r-total').innerText = rev.toLocaleString() + ' đ';
        document.getElementById('r-count').innerText = history.length;
    }

    function renderChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00'],
                datasets: [{
                    label: 'Doanh thu thực (đ)',
                    data: [150000, 450000, 890000, 1200000, 2100000, 3500000],
                    borderColor: '#6366f1',
                    borderWidth: 4,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(99, 102, 241, 0.1)'
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleString('vi-VN'); }

    init();
</script>
</body>
</html>
