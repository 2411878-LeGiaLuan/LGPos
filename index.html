<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MURTHELP | SECURITY RESTORED</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff3c3c; --black: #050505; --panel: #0d0d0d; --gold: #facc15; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* PHẦN ĐĂNG NHẬP PHÂN LUỒNG */
        #security-gate {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .gate-box {
            width: 90%; max-width: 400px; padding: 40px; border: 1px solid #222;
            background: #0a0a0a; text-align: center; border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 60, 60, 0.1);
        }
        .gate-box h1 { font-family: 'Syncopate'; font-size: 22px; color: var(--red); margin-bottom: 30px; letter-spacing: 5px; }
        .gate-input {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff;
            text-align: center; font-size: 18px; outline: none; margin-bottom: 20px; border-radius: 10px;
        }
        .gate-btn {
            width: 100%; padding: 15px; background: var(--red); color: white; border: none;
            font-weight: 900; cursor: pointer; border-radius: 10px; transition: 0.3s;
        }
        .gate-btn:hover { background: #ff5e5e; transform: scale(1.02); }

        /* MAIN LAYOUT */
        #app-shell { display: none; flex-direction: column; height: 100vh; }
        header { 
            height: 70px; background: #000; border-bottom: 2px solid var(--red); 
            display: flex; align-items: center; padding: 0 25px; gap: 20px; z-index: 1001;
        }
        .menu-btn { font-size: 26px; cursor: pointer; color: var(--red); }
        .wrapper { display: flex; flex: 1; position: relative; overflow: hidden; }

        /* SIDEBAR */
        aside.sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid #222;
            transition: 0.4s; overflow: hidden; display: flex; flex-direction: column;
        }
        aside.sidebar.collapsed { width: 0; border: none; }
        .nav-item { 
            padding: 22px; border-bottom: 1px solid #1a1a1a; cursor: pointer; white-space: nowrap;
            transition: 0.3s; display: flex; align-items: center; gap: 15px; font-weight: bold;
        }
        .nav-item:hover { background: #1a1a1a; color: var(--red); }

        main.viewport { flex: 1; overflow-y: auto; padding: 25px; background: #080808; }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        /* CARD VŨ KHÍ */
        .w-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; text-align: center; }
        .w-img-box { width: 100%; height: 150px; background: #000; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .w-img-box img { width: 95%; height: 95%; object-fit: contain; }

        /* GIỎ HÀNG */
        #cart-panel {
            position: fixed; right: 20px; bottom: 20px; width: 380px; max-height: 60vh;
            background: #0d0d0d; border: 2px solid var(--red); border-radius: 20px;
            display: flex; flex-direction: column; z-index: 1000; transition: 0.5s;
        }
        #cart-panel.hidden { transform: translateX(450px); }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }

        @media (max-width: 768px) {
            #cart-panel { width: calc(100% - 40px); left: 20px; }
            .sidebar { position: absolute; z-index: 1002; height: 100%; box-shadow: 50px 0 100px #000; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; color: #000; padding: 40px; border-radius: 25px; width: 90%; max-width: 450px; text-align: center; }
        .btn-pay { width: 100%; padding: 18px; background: var(--red); color: #fff; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="security-gate">
        <div class="gate-box">
            <h1>MURTHELP</h1>
            <input type="password" id="access-code" class="gate-input" placeholder="ENTER ACCESS KEY">
            <button class="gate-btn" onclick="login()">AUTHORIZE SYSTEM</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <div style="font-family:'Syncopate'; font-size:22px; color:var(--red);">MURTHELP.OS</div>
            <div style="margin-left: auto; font-size: 14px;">RANK: <span id="rank-name" style="color:var(--gold)">---</span></div>
        </header>

        <div class="wrapper">
            <aside class="sidebar" id="sidebar">
                <div class="nav-item" onclick="showTab('arsenal')"><i class="fas fa-crosshairs"></i> VŨ KHÍ TẬN THẾ</div>
                <div id="boss-tools" style="display:none;">
                    <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-chart-pie"></i> DOANH THU & KHO</div>
                    <div class="nav-item" onclick="showTab('vips')"><i class="fas fa-skull"></i> DANH SÁCH WARLORDS</div>
                </div>
                <div class="nav-item" style="margin-top:auto; color:#444;" onclick="location.reload()"><i class="fas fa-power-off"></i> THOÁT</div>
            </aside>

            <main class="viewport">
                <div id="tab-arsenal" class="tab-content">
                    <h2 style="margin-bottom:25px; font-family:'Syncopate'; color:var(--gold)">ARMS DEALER LIST</h2>
                    <div class="weapon-grid" id="weapon-list"></div>
                </div>

                <div id="tab-boss" class="tab-content" style="display:none;">
                    <h2 style="margin-bottom:25px; font-family:'Syncopate'; color:var(--red)">BOSS DASHBOARD</h2>
                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:20px;">
                        <div style="background:#111; padding:20px; border-radius:10px; border-left:4px solid var(--gold)">TỔNG TIỀN: <h1 id="total-rev">$0</h1></div>
                        <div style="background:#111; padding:20px; border-radius:10px; border-left:4px solid var(--red)">ĐƠN HÀNG: <h1 id="order-count">0</h1></div>
                    </div>
                </div>

                <div id="tab-vips" class="tab-content" style="display:none;">
                    <h2 style="margin-bottom:25px; font-family:'Syncopate';">WARLORDS</h2>
                    <div id="vip-list-container"></div>
                </div>
            </main>
        </div>

        <div id="cart-panel">
            <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                <b>LOADOUT</b>
                <i class="fas fa-chevron-down" onclick="toggleCart()" style="cursor:pointer"></i>
            </div>
            <div class="cart-items" id="cart-data"></div>
            <div style="padding:20px; background:#111; border-radius:0 0 20px 20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:20px;">
                    <span>TOTAL:</span><span id="cart-total" style="color:var(--gold)">$0</span>
                </div>
                <button class="btn-pay" onclick="openPayment()">THANH TOÁN</button>
            </div>
        </div>

        <div id="cart-trigger" onclick="toggleCart()" style="position:fixed; bottom:30px; right:30px; width:60px; height:60px; background:var(--red); border-radius:50%; display:none; align-items:center; justify-content:center; z-index:999;">
            <i class="fas fa-shopping-cart"></i>
        </div>
    </div>

    <div id="pay-modal" class="modal">
        <div class="modal-box">
            <h2 style="font-family:'Syncopate'">SECURE PAY</h2>
            <div id="qrcode" style="display:flex; justify-content:center; margin:25px 0;"></div>
            <h1 id="vnd-total" style="color:var(--red); font-size:35px;">0 VNĐ</h1>
            <button class="btn-pay" onclick="confirmSuccess()">XÁC NHẬN ĐÃ NHẬN TIỀN</button>
            <button class="btn-pay" style="background:#ddd; color:#000; margin-top:10px;" onclick="closePayment()">HỦY</button>
        </div>
    </div>

<script>
    const weapons = [
        { id:1, name:"AK-47 Classic", price:3500, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/AK-47_type_II_no_BG.png/640px-AK-47_type_II_no_BG.png" },
        { id:2, name:"Desert Eagle .50", price:1800, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Desert_Eagle_I.jpg/640px-Desert_Eagle_I.jpg" },
        { id:3, name:"Barrett M82 Sniper", price:15000, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Barrett_M82A1_fixed_stock.png/640px-Barrett_M82A1_fixed_stock.png" }
    ];
    for(let i=4; i<=100; i++) {
        weapons.push({ id:i, name:`Weapon X-${i+100}`, price: Math.floor(Math.random()*8000)+1000, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Walther_P99_noBG.png/640px-Walther_P99_noBG.png" });
    }

    let cart = [];
    let revenue = 0;
    let orders = 0;

    // HÀM ĐĂNG NHẬP PHÂN LUỒNG
    function login() {
        const code = document.getElementById('access-code').value;
        if(code === 'LuanLG') {
            document.getElementById('security-gate').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('boss-tools').style.display = 'block'; // Hiện chức năng Boss
            document.getElementById('rank-name').innerText = 'BOSS GIA LUÂN';
            renderArsenal();
        } else if(code === 'LGPro') {
            document.getElementById('security-gate').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('boss-tools').style.display = 'none'; // Ẩn chức năng Boss
            document.getElementById('rank-name').innerText = 'STAFF ELITE';
            renderArsenal();
        } else {
            Swal.fire('ACCESS DENIED', 'Mã khóa không chính xác!', 'error');
        }
    }

    function renderArsenal() {
        const grid = document.getElementById('weapon-list');
        grid.innerHTML = weapons.map(w => `
            <div class="w-card">
                <div class="w-img-box"><img src="${w.img}" onerror="this.src='https://via.placeholder.com/150/000/f00?text=GUN'"></div>
                <div style="font-weight:bold; font-size:12px;">${w.name}</div>
                <div style="color:var(--gold); margin:10px 0;">$${w.price.toLocaleString()}</div>
                <button onclick="addToCart(${w.id})" style="width:100%; padding:8px; background:var(--red); border:none; color:#fff; font-weight:bold; cursor:pointer; border-radius:5px;">MUA</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = weapons.find(w => w.id === id);
        cart.push({...item});
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-data');
        container.innerHTML = cart.map((item, idx) => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                <span>${item.name}</span>
                <b style="color:var(--gold)">$${item.price}</b>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleCart() {
        const panel = document.getElementById('cart-panel');
        const trigger = document.getElementById('cart-trigger');
        if(panel.classList.contains('hidden')) { panel.classList.remove('hidden'); trigger.style.display = 'none'; }
        else { panel.classList.add('hidden'); trigger.style.display = 'flex'; }
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById('tab-'+tabId).style.display = 'block';
        if(window.innerWidth < 768) toggleSidebar();
    }

    function openPayment() {
        if(cart.length === 0) return;
        const totalUSD = cart.reduce((s, i) => s + i.price, 0);
        const totalVND = totalUSD * 25450;
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd-total').innerText = totalVND.toLocaleString() + " VNĐ";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${totalVND}`, width: 220, height: 220 });
    }

    function confirmSuccess() {
        revenue += cart.reduce((s, i) => s + i.price, 0);
        orders++;
        document.getElementById('total-rev').innerText = `$${revenue.toLocaleString()}`;
        document.getElementById('order-count').innerText = orders;
        Swal.fire('THÀNH CÔNG', 'Đã ghi nhận đơn hàng.', 'success');
        cart = []; updateCartUI(); closePayment();
    }
    function closePayment() { document.getElementById('pay-modal').style.display = 'none'; }
</script>
</body>
</html>
