<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LGBank POS System</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
        .header { background: #1a237e; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
        .feature-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .feature-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .status-bar { background: #e8eaf6; padding: 10px 20px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <span>LGBank POS - Nhân viên: Thu ngân 01</span>
        <span>05/04/2026 09:10</span>
    </div>
    <div class="status-bar">
        Cửa hàng: Hồng Trà Hòa Bình | IP: 192.168.1.117 | Trạng thái: Đang kết nối
    </div>
    <div class="main-grid">
        <div class="feature-card"><b>1. Góp ý, hỗ trợ</b></div>
        <div class="feature-card"><b>2. Quản lý kết nối</b></div>
        <div class="feature-card"><b>6. Quản lý máy in</b></div>
        <div class="feature-card"><b>11. Nhật ký Order</b></div>
        <div class="feature-card" style="background: #fff3e0;"><b>Quản lý Ca</b></div>
    </div>
</body>
</html>
