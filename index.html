<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGSHOPCOMPANY | ARSENAL REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff3c3c; --gold: #facc15; --black: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* AUTH GATE */
        #login-gate { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .murt-input { width: 350px; padding: 18px; background: #0a0a0a; border: 1px solid #222; color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none; }
        .murt-btn { width: 350px; padding: 18px; background: var(--red); border: none; color: #fff; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* MAIN LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr 380px; }
        aside { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .nav-item { padding: 25px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 13px; font-weight: 800; }
        .nav-item.active { background: #111; color: var(--red); border-left: 4px solid var(--red); }

        main { overflow-y: auto; padding: 30px; background: #050505; }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .w-card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 8px; transition: 0.3s; text-align: center; }
        .w-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .w-img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 15px; border-radius: 5px; background: #000; }
        .w-name { font-weight: 800; font-size: 13px; color: #eee; margin: 10px 0; height: 35px; overflow: hidden; }

        /* CART & POS */
        .pos-panel { background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-header { padding: 25px; font-family: 'Syncopate'; font-size: 12px; color: var(--red); border-bottom: 1px solid #1a1a1a; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .total-box { padding: 30px; background: #000; border-top: 2px solid var(--red); }

        /* VIP */
        .vip-card { background: #0d0d0d; border: 1px solid #222; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; }
        .vip-avatar { width: 65px; height: 65px; border-radius: 5px; border: 2px solid var(--gold); object-fit: cover; }

        /* PAYMENT MODAL */
        #pay-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        .pay-box { background: #fff; padding: 40px; border-radius: 10px; text-align: center; color: #000; width: 420px; }
    </style>
</head>
<body>

    <div id="login-gate">
        <h1 style="font-family:'Syncopate'; color:#fff; margin-bottom:30px; border-bottom:3px solid var(--red)">LGSHOPCOMPANY</h1>
        <input type="password" id="pass" class="murt-input" placeholder="ACCESS KEY">
        <button class="murt-btn" onclick="login()">INITIALIZE ACCESS</button>
    </div>

    <div id="app">
        <aside>
            <div style="padding: 30px; font-family: 'Syncopate'; color: var(--red); font-size: 12px;">MURTHELP CONTROL</div>
            <div class="nav-item active" onclick="showTab('arsenal')"><i class="fas fa-crosshairs"></i> ARSENAL</div>
            <div class="nav-item" onclick="showTab('vips')"><i class="fas fa-id-badge"></i> ASSASSINS</div>
            <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-crown"></i> EMPIRE HUB</div>
            <div class="nav-item" style="margin-top:auto; color:#333" onclick="location.reload()"><i class="fas fa-power-off"></i> LOGOUT</div>
        </aside>

        <main>
            <div id="tab-arsenal">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:16px; color:var(--gold)">LIVE STOCK INVENTORY</h2>
                <div class="weapon-grid" id="w-list"></div>
            </div>

            <div id="tab-vips" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:16px; color:var(--red)">ELITE CUSTOMER LIST</h2>
                <div id="vip-list"></div>
            </div>

            <div id="tab-boss" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:16px; color:var(--red)">MANAGEMENT HUB</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="background:#0d0d0d; padding:30px; border-radius:10px; border-left:5px solid var(--gold);">
                        <small>TOTAL SALES</small>
                        <h1 id="rev" style="font-size:35px; margin-top:10px;">$0</h1>
                    </div>
                    <div style="background:#0d0d0d; padding:30px; border-radius:10px; border-left:5px solid var(--red);">
                        <small>CONTRACTS</small>
                        <h1 id="orders" style="font-size:35px; margin-top:10px;">0</h1>
                    </div>
                </div>
            </div>
        </main>

        <div class="pos-panel">
            <div class="cart-header">ORDER SELECTION</div>
            <div class="cart-items" id="cart-data"></div>
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span style="color:#555">TOTAL:</span>
                    <h2 id="total-val" style="color:var(--gold)">$0</h2>
                </div>
                <button class="murt-btn" onclick="pay()" style="width:100%">GENERATE INVOICE</button>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="pay-box">
            <h3 style="margin-bottom:20px; font-family:'Syncopate'">PAYMENT ENCRYPTED</h3>
            <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <h2 id="vnd" style="color:var(--red); margin-bottom:30px;">0 VNĐ</h2>
            <button class="murt-btn" onclick="done()" style="width:100%">CONFIRM TRANSFER</button>
            <button class="murt-btn" style="background:#eee; color:#000; margin-top:10px; width:100%" onclick="closePay()">CANCEL</button>
        </div>
    </div>

<script>
    // DỮ LIỆU VŨ KHÍ - SỬ DỤNG LINK ẢNH TỪ KHO LƯU TRỮ KHÔNG CHẶN
    const db = [
        { id:1, n:"Barrett M82A1 Sniper", p:18500, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/m82.png" },
        { id:2, n:"HK416 Assault Rifle", p:4500, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/hk416.png" },
        { id:3, n:"Glock 17 Tactical", p:1200, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/glock.png" },
        { id:4, n:"FN P90 SMG", p:3200, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/p90.png" },
        { id:5, n:"Benelli M4 Shotgun", p:2800, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/benelli.png" },
        { id:6, n:"Katana Damascus Steel", p:5500, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/katana.png" },
        { id:7, n:"AK-47 Modern", p:3500, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/ak47.png" },
        { id:8, n:"M4A1 Carbine", p:4200, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/m4a1.png" },
        { id:9, n:"Sig Sauer P320", p:950, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/sig.png" },
        { id:10, n:"Desert Eagle .50", p:2200, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/deagle.png" }
    ];

    const weapons = [];
    for(let i=0; i<100; i++) {
        const base = db[i % 10];
        weapons.push({ id:i+1, n:`${base.n} v${i+1}`, p:base.p + (i*20), img:base.img });
    }

    const assassins = [
        { name: "John Wick", rank: "High Table", bio: "Hạng Đỏ - Sát thủ huyền thoại.", avatar: "https://vignette.wikia.nocookie.net/john-wick/images/2/2f/John_Wick_Chapter_2.jpg" },
        { name: "Vincenzo Cassano", rank: "Mafia Consigliere", bio: "Hạng Tím - Chuyên gia chiến tranh tâm lý.", avatar: "https://upload.wikimedia.org/wikipedia/vi/0/05/Vincenzo_poster.jpg" },
        { name: "Jeong Jin-man", rank: "Admin", bio: "Chủ sở hữu hệ thống Murthelp.", avatar: "https://i.mydramalist.com/RrW87_5f.jpg" }
    ];

    let cart = []; let totalRev = 0; let totalOrders = 0;

    function login() {
        const p = document.getElementById('pass').value;
        if(p === 'LuanLG' || p === 'LGPro') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            renderWeapons(); renderVIPs();
        } else { Swal.fire('Error', 'Invalid Access Key!', 'error'); }
    }

    function renderWeapons() {
        document.getElementById('w-list').innerHTML = weapons.map(w => `
            <div class="w-card">
                <img src="${w.img}" class="w-img" loading="lazy">
                <div class="w-name">${w.n}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--gold)">$${w.p.toLocaleString()}</b>
                    <button onclick="add(${w.id})" style="background:var(--red); border:none; color:white; width:35px; height:35px; border-radius:5px; cursor:pointer"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function renderVIPs() {
        document.getElementById('vip-list').innerHTML = assassins.map(v => `
            <div class="vip-card">
                <img src="${v.avatar}" class="vip-avatar">
                <div>
                    <h4 style="color:var(--gold)">${v.name} | <small style="color:#777">${v.rank}</small></h4>
                    <p style="font-size:12px; color:#999; margin-top:5px;">${v.bio}</p>
                </div>
            </div>
        `).join('');
    }

    function add(id) { cart.push(weapons.find(w => w.id === id)); updateCart(); }
    function remove(idx) { cart.splice(idx,1); updateCart(); }

    function updateCart() {
        document.getElementById('cart-data').innerHTML = cart.map((i, idx) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:11px; border-bottom:1px solid #111; padding-bottom:8px;">
                <span>${i.n}</span>
                <b>$${i.p.toLocaleString()} <i class="fas fa-trash" onclick="remove(${idx})" style="margin-left:8px; cursor:pointer; color:#333"></i></b>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.p, 0);
        document.getElementById('total-val').innerText = `$${total.toLocaleString()}`;
    }

    function pay() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.p, 0);
        const vnd = total * 25450;
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd').innerText = vnd.toLocaleString() + " VNĐ";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${vnd}&addInfo=GIALUAN_MURTHELP`, width: 200, height: 200 });
    }

    function done() {
        totalRev += cart.reduce((s, i) => s + i.p, 0);
        totalOrders++;
        document.getElementById('rev').innerText = `$${totalRev.toLocaleString()}`;
        document.getElementById('orders').innerText = totalOrders;
        cart = []; updateCart(); closePay();
        Swal.fire('Success', 'Transaction Verified!', 'success');
    }

    function closePay() { document.getElementById('pay-modal').style.display = 'none'; }
    function showTab(id) {
        ['arsenal', 'vips', 'boss'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
        document.getElementById('tab-'+id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
