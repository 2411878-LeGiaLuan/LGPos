<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGSHOPCOMPANY | ELITE ARSENAL</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #facc15; --red: #ff3c3c; --black: #050505; --dark: #0d0d0d;
            --code-red: #ff4444; --code-purple: #a855f7; --code-yellow: #fbbf24; --code-green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* LOGIN: LGShopCompany - ĐỐI XỨNG & ĐẸP */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .brand-header {
            font-family: 'Syncopate', sans-serif; font-size: 32px; font-weight: 900;
            letter-spacing: -1px; margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff 40%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
        }
        .login-card {
            width: 380px; padding: 40px; background: var(--dark);
            border: 1px solid #222; border-radius: 4px; text-align: center;
        }
        .murt-input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: var(--gold); font-size: 20px; text-align: center; outline: none; margin-bottom: 20px;
        }
        .murt-btn {
            width: 100%; padding: 15px; background: var(--red); color: white;
            border: none; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* GIAO DIỆN CHÍNH */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header {
            height: 70px; background: #000; border-bottom: 2px solid var(--red);
            display: flex; align-items: center; padding: 0 30px; justify-content: space-between;
        }
        .wrapper { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR CHUẨN A SHOP FOR KILLER */
        aside {
            width: 260px; background: var(--dark); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column;
        }
        .nav-item {
            padding: 20px 25px; border-bottom: 1px solid #151515; cursor: pointer;
            display: flex; align-items: center; gap: 15px; transition: 0.2s; font-size: 13px;
        }
        .nav-item:hover, .nav-item.active { background: #151515; border-left: 4px solid var(--red); color: var(--red); }

        main { flex: 1; overflow-y: auto; padding: 30px; background: #080808; }

        /* WEAPON CARDS */
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .w-card {
            background: #0f0f0f; border: 1px solid #222; border-radius: 8px;
            padding: 20px; position: relative; transition: 0.3s;
        }
        .w-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .w-img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 15px; }
        
        .code-tag {
            position: absolute; top: 10px; right: 10px; font-size: 9px;
            padding: 3px 8px; border-radius: 2px; font-weight: 900;
        }

        /* CART & POS */
        .pos-panel {
            width: 400px; background: var(--dark); border-left: 1px solid #222;
            display: flex; flex-direction: column;
        }
        .cart-content { flex: 1; overflow-y: auto; padding: 20px; }
        .checkout-box { padding: 25px; background: #000; border-top: 2px solid var(--red); }

        /* MODAL */
        #pay-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 20000; align-items: center; justify-content: center;
        }
        .pay-box { background: #fff; padding: 40px; border-radius: 8px; text-align: center; color: #000; width: 400px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="brand-header">LGShopCompany</div>
        <div class="login-card">
            <input type="password" id="access-key" class="murt-input" placeholder="PASSKEY">
            <button class="murt-btn" onclick="login()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="font-family:'Syncopate'; font-size:18px; color:var(--red);">MURTHELP.OS</div>
            <div style="display:flex; gap:30px; font-size:12px;">
                <span id="clock"></span>
                <span style="color:var(--gold)">OPERATOR: GIA LUÂN</span>
            </div>
        </header>

        <div class="wrapper">
            <aside>
                <div class="nav-item active" onclick="showTab('arsenal')"><i class="fas fa-crosshairs"></i> VŨ KHÍ CHIẾN LƯỢC</div>
                <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-user-shield"></i> QUẢN TRỊ VIÊN</div>
                <div class="nav-item" style="margin-top:auto; color:var(--gold)" onclick="location.reload()"><i class="fas fa-power-off"></i> THOÁT HỆ THỐNG</div>
            </aside>

            <main>
                <div id="tab-arsenal">
                    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                        <h2 style="font-family:'Syncopate'; font-size:16px;">INVENTORY</h2>
                        <input type="text" id="search" placeholder="Tìm kiếm..." onkeyup="search()" style="background:#111; border:1px solid #333; color:#fff; padding:8px 20px; border-radius:20px;">
                    </div>
                    <div class="weapon-grid" id="weapon-list"></div>
                </div>

                <div id="tab-boss" style="display:none;">
                    <h2 style="font-family:'Syncopate'; margin-bottom:30px; color:var(--red);">BOSS DASHBOARD</h2>
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                        <div style="background:var(--dark); padding:30px; border-radius:8px;">
                            <small>DOANH THU</small>
                            <h1 id="total-rev" style="color:var(--gold)">$0</h1>
                        </div>
                        <div style="background:var(--dark); padding:30px; border-radius:8px;">
                            <small>ĐƠN HÀNG</small>
                            <h1 id="total-orders">0</h1>
                        </div>
                    </div>
                </div>
            </main>

            <div class="pos-panel">
                <div style="padding:20px; border-bottom:1px solid #222; font-weight:900;">GIỎ HÀNG</div>
                <div class="cart-content" id="cart-items"></div>
                <div class="checkout-box">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <span>TỔNG CỘNG:</span>
                        <h2 id="cart-total" style="color:var(--gold)">$0</h2>
                    </div>
                    <button class="murt-btn" onclick="openPay()">THANH TOÁN (VIETQR)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="pay-box">
            <h3 style="margin-bottom:20px;">QUÉT MÃ ĐỂ NHẬN HÀNG</h3>
            <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <h2 id="vnd-price" style="color:var(--red); margin-bottom:25px;">0 VNĐ</h2>
            <button class="murt-btn" onclick="confirmOrder()">XÁC NHẬN ĐÃ CHUYỂN</button>
            <button class="murt-btn" style="background:#ddd; color:#000; margin-top:10px;" onclick="closePay()">QUAY LẠI</button>
        </div>
    </div>

<script>
    // DỮ LIỆU THẬT 100 VŨ KHÍ (A Shop For Killer Style)
    const database = [
        { id:1, name:"AWM Sniper Rifle", price:15000, code:"PURPLE", stock:5, img:"https://pngimg.com/uploads/sniper_rifle/sniper_rifle_PNG35.png" },
        { id:2, name:"Glock 18 Tactical", price:1200, code:"YELLOW", stock:20, img:"https://pngimg.com/uploads/pistol/pistol_PNG24.png" },
        { id:3, name:"AK-47 Kalashnikov", price:3500, code:"RED", stock:12, img:"https://pngimg.com/uploads/ak47/ak47_PNG15442.png" },
        { id:4, name:"M4A1 Carbine", price:4200, code:"RED", stock:10, img:"https://pngimg.com/uploads/m4/m4_PNG22.png" },
        { id:5, name:"Katana Muramasa", price:2800, code:"RED", stock:3, img:"https://pngimg.com/uploads/katana/katana_PNG43.png" },
        { id:6, name:"Combat Medic Kit", price:500, code:"GREEN", stock:50, img:"https://pngimg.com/uploads/first_aid_kit/first_aid_kit_PNG45.png" }
    ];

    // Tự động bù cho đủ 100 món
    for(let i=7; i<=100; i++) {
        database.push({ id:i, name:`Vũ khí hạng #00${i}`, price:Math.floor(Math.random()*5000)+1000, code: i%3==0 ? "PURPLE" : "RED", stock:15, img:"https://pngimg.com/uploads/pistol/pistol_PNG24.png"});
    }

    let cart = [];
    let revenue = 0;
    let orders = 0;

    function login() {
        const key = document.getElementById('access-key').value;
        if(key === 'LuanLG' || key === 'LGPro') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            renderArsenal(database);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
        } else {
            Swal.fire('LỖI', 'Mã truy cập không chính xác', 'error');
        }
    }

    function renderArsenal(data) {
        const container = document.getElementById('weapon-list');
        container.innerHTML = data.map(w => `
            <div class="w-card">
                <span class="code-tag" style="background:var(--code-${w.code.toLowerCase()})">CODE ${w.code}</span>
                <img src="${w.img}" class="w-img">
                <div style="font-weight:bold; font-size:14px; margin-bottom:10px;">${w.name}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--gold)">$${w.price.toLocaleString()}</b>
                    <button onclick="addToCart(${w.id})" style="background:var(--red); border:none; color:#fff; padding:5px 10px; cursor:pointer; border-radius:3px;"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = database.find(w => w.id === id);
        cart.push(item);
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items');
        container.innerHTML = cart.map((item, idx) => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222; font-size:12px;">
                <span>${item.name}</span>
                <b style="color:var(--gold)">$${item.price.toLocaleString()}</b>
                <i class="fas fa-trash" onclick="remove(${idx})" style="color:#555; cursor:pointer"></i>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
    }

    function remove(idx) { cart.splice(idx, 1); updateCartUI(); }

    function openPay() {
        if(cart.length === 0) return;
        const totalUSD = cart.reduce((s, i) => s + i.price, 0);
        const totalVND = totalUSD * 25450;
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd-price').innerText = totalVND.toLocaleString() + " VNĐ";
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${totalVND}&addInfo=GIALUAN_LGSHOP`,
            width: 200, height: 200
        });
    }

    function confirmOrder() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        revenue += total;
        orders++;
        document.getElementById('total-rev').innerText = `$${revenue.toLocaleString()}`;
        document.getElementById('total-orders').innerText = orders;
        
        cart = []; updateCartUI(); closePay();
        Swal.fire('THÀNH CÔNG', 'Giao dịch đã được ghi nhận vào hệ thống.', 'success');
    }

    function closePay() { document.getElementById('pay-modal').style.display = 'none'; }
    function showTab(id) {
        document.getElementById('tab-arsenal').style.display = id === 'arsenal' ? 'block' : 'none';
        document.getElementById('tab-boss').style.display = id === 'boss' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function search() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = database.filter(w => w.name.toLowerCase().includes(val));
        renderArsenal(filtered);
    }
</script>
</body>
</html>
