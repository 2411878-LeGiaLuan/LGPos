<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGSHOP ARMORY OMNIVERSE | SUPREME COMMAND</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --plasma: #00f2ff;
            --war-red: #ff004c;
            --gold: #ffcc00;
            --void: #020205;
            --panel: rgba(10, 15, 25, 0.95);
            --border: rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            background-color: var(--void);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* COMMAND SIDEBAR - VANG DANH THIÊN CỔ */
        .sidebar {
            width: 130px;
            background: #000;
            border-right: 2px solid var(--plasma);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            gap: 25px;
            box-shadow: 10px 0 50px rgba(0, 242, 255, 0.1);
            z-index: 100;
        }

        .nav-btn {
            width: 80px; height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; border: 1px solid var(--border);
            color: #555; transition: all 0.4s;
            text-decoration: none; font-size: 10px; font-weight: 800; gap: 8px;
            background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
        }

        .nav-btn i { font-size: 26px; }
        .nav-btn.active {
            color: var(--plasma);
            border-color: var(--plasma);
            box-shadow: 0 0 25px var(--plasma);
            background: rgba(0, 242, 255, 0.1);
            transform: scale(1.1);
        }

        /* MAIN STRATEGIC AREA */
        .viewport { flex: 1; display: flex; flex-direction: column; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }

        .header-status {
            height: 80px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .glitch-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 20px; font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--plasma), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        /* CONTENT ENGINE */
        .content-frame { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }
        .page { display: none; animation: warpIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page.active { display: block; }

        @keyframes warpIn {
            from { opacity: 0; transform: perspective(1000px) translateZ(-500px); filter: brightness(2); }
            to { opacity: 1; transform: perspective(1000px) translateZ(0); filter: brightness(1); }
        }

        /* ARSENAL GRID */
        .arsenal-layout { display: grid; grid-template-columns: 1fr 400px; gap: 30px; height: 100%; }
        .weapon-shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }

        .item-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 15px; padding: 25px; position: relative;
            transition: 0.3s; overflow: hidden;
        }
        .item-card:hover { border-color: var(--plasma); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2); }
        .item-card::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--plasma)); animation: scanline 3s infinite;
        }
        @keyframes scanline { to { left: 100%; } }

        /* CART & PAYMENT TERMINAL */
        .terminal {
            background: #050505; border: 2px solid var(--border);
            border-radius: 25px; padding: 30px; display: flex; flex-direction: column;
            min-height: 600px; position: sticky; top: 0;
        }
        .cart-list { flex: 1; overflow-y: auto; margin: 20px 0; border-top: 1px solid #222; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; font-size: 13px; }

        .cart-footer { padding: 30px; border-top: 1px solid #f1f5f9; background: #f8fafc; border-radius: 0 0 30px 30px; }
        .pay-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .m-btn { padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .m-btn.active { border-color: var(--primary); color: var(--primary); background: #eef2ff; }

        .btn-pay { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--dark); color: white; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-pay:hover { background: var(--primary); transform: scale(1.02); }

        /* DASHBOARD STATS */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .s-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .s-card label { color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .s-card h2 { font-size: 28px; font-weight: 800; margin-top: 5px; }

        /* QR MODAL */
        #qr-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .qr-card { background: white; padding: 40px; border-radius: 40px; text-align: center; width: 450px; }
        .qr-card img { width: 250px; height: 250px; border-radius: 20px; margin: 20px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-btn active" onclick="nav('pos', this)"><i class="fas fa-cash-register"></i><span>Bán hàng</span></div>
        <div class="nav-btn" onclick="nav('inventory', this)"><i class="fas fa-boxes"></i><span>Inventory</span></div>
        <div class="nav-btn" onclick="nav('reports', this)"><i class="fas fa-chart-line"></i><span>Báo cáo</span></div>
    </aside>

    <div class="main">
        <div class="header">
            <div class="shop-brand">LGSHOP ARSENAL v3.0</div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <span id="timer">00:00:00</span>
                <span>Gia Luân (Admin)</span>
            </div>
        </div>

        <div class="zone active" id="pos">
            <div class="arsenal-layout">
                <div class="weapon-shelf" id="weapon-grid"></div>
                <div class="cart-panel">
                    <h3 style="font-weight: 800;">CHI TIẾT ĐƠN HÀNG</h3>
                    <div class="cart-list" id="cart-list"></div>
                    <div class="cart-footer">
                        <div class="pay-methods">
                            <button class="m-btn active" id="m-cash" onclick="setMethod('Tiền mặt')">💵 TIỀN MẶT</button>
                            <button class="m-btn" id="m-qr" onclick="setMethod('Chuyển khoản')">📲 QUÉT QR</button>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 24px;">
                            <span>TỔNG:</span><span id="total-val">0 đ</span>
                        </div>
                        <button class="btn-pay" onclick="handleCheckout()">THANH TOÁN</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-overlay">
        <div class="qr-card">
            <h2>THANH TOÁN QR</h2>
            <img id="qr-gen" src="" alt="QR">
            <p>Vui lòng quét mã để chuyển khoản</p>
            <button class="btn-pay" onclick="confirmPayment()">XÁC NHẬN ĐÃ CHUYỂN</button>
        </div>
    </div>

<script>
    // --- KHỞI TẠO DỮ LIỆU ---
    let products = JSON.parse(localStorage.getItem('LGS_PROD')) || [
        { id: 101, name: 'Hồng Trà Sữa LG', price: 35000, stock: 100 },
        { id: 102, name: 'Cà Phê Muối Paradigm', price: 45000, stock: 50 },
        { id: 103, name: 'Trà Nhãn Sen Vàng', price: 55000, stock: 30 }
    ];
    let cart = [];
    let method = 'Tiền mặt';

    // --- POS LOGIC ---
    function renderProducts() {
        const grid = document.getElementById('weapon-grid');
        grid.innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <span class="stock">Kho: ${p.stock}</span>
                <h3>${p.name}</h3>
                <b>${p.price.toLocaleString()} đ</b>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(p.stock <= 0) return Swal.fire('Hết hàng!', '', 'error');
        cart.push({...p});
        p.stock--;
        updateCartUI();
        renderProducts();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.map((item, idx) => `
            <div class="cart-item">
                <span>${item.name}</span>
                <i class="fas fa-times-circle" style="color:red;" onclick="removeFromCart(${idx})"></i>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-val').innerText = total.toLocaleString() + ' đ';
    }

    function handleCheckout() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        if(method === 'Chuyển khoản') {
            document.getElementById('qr-overlay').style.display = 'flex';
            document.getElementById('qr-gen').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=LGSHOP_PAY_${total}`;
        } else {
            confirmPayment();
        }
    }

    renderProducts();
</script>
</body>
</html>
