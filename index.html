<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGSHOPCOMPANY | MURTHELP OS</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff3c3c; --gold: #facc15; --black: #050505; --gray: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* LOGIN SCREEN - ĐẸP & ĐỐI XỨNG TUYỆT ĐỐI */
        #login-gate { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .brand-logo { font-family: 'Syncopate'; font-size: 35px; letter-spacing: -1px; color: #fff; margin-bottom: 40px; text-transform: uppercase; border-bottom: 4px solid var(--red); padding-bottom: 5px; }
        .login-box { width: 350px; text-align: center; }
        .murt-input { width: 100%; padding: 18px; background: #0a0a0a; border: 1px solid #222; color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none; border-radius: 4px; }
        .murt-btn { width: 100%; padding: 18px; background: var(--red); border: none; color: #fff; font-weight: 900; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; }

        /* APP LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr 380px; }
        
        /* SIDEBAR */
        aside { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .nav-item { padding: 25px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 13px; font-weight: 800; }
        .nav-item:hover, .nav-item.active { background: #111; color: var(--red); border-left: 4px solid var(--red); }

        /* MAIN AREA */
        main { overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0a0a0a, #050505); }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .w-card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 8px; position: relative; transition: 0.3s; }
        .w-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .w-img { width: 100%; height: 140px; object-fit: contain; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 5px; }
        .w-cat { font-size: 10px; color: #555; text-transform: uppercase; }
        .w-name { font-weight: 800; font-size: 13px; margin: 5px 0; height: 35px; overflow: hidden; }

        /* POS / CART */
        .pos-panel { background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-header { padding: 25px; font-family: 'Syncopate'; font-size: 14px; color: var(--red); border-bottom: 1px solid #1a1a1a; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .total-box { padding: 30px; background: #000; border-top: 2px solid var(--red); }

        /* VIP SECTION */
        .vip-card { background: #0d0d0d; border: 1px solid #222; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; }
        .vip-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); }

        /* MODAL */
        #pay-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        .pay-box { background: #fff; padding: 40px; border-radius: 10px; text-align: center; color: #000; width: 420px; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="brand-logo">LGShopCompany</div>
        <div class="login-box">
            <input type="password" id="pass" class="murt-input" placeholder="ENTER ACCESS KEY">
            <button class="murt-btn" onclick="login()">INITIALIZE ACCESS</button>
        </div>
    </div>

    <div id="app">
        <aside>
            <div style="padding: 30px; font-family: 'Syncopate'; color: var(--red);">MURTHELP.OS</div>
            <div class="nav-item active" onclick="showTab('arsenal')"><i class="fas fa-gun"></i> KHO VŨ KHÍ</div>
            <div class="nav-item" onclick="showTab('vips')"><i class="fas fa-user-secret"></i> DANH SÁCH SÁT THỦ</div>
            <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-shield-halved"></i> QUẢN LÝ ĐẾ CHẾ</div>
            <div class="nav-item" style="margin-top:auto; color:#444" onclick="location.reload()"><i class="fas fa-power-off"></i> LOGOUT</div>
        </aside>

        <main>
            <div id="tab-arsenal">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:18px; color:var(--gold)">PREMIUM ARSENAL</h2>
                <div class="weapon-grid" id="w-list"></div>
            </div>

            <div id="tab-vips" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:18px; color:var(--red)">THE CONTINENTAL MEMBERS</h2>
                <div id="vip-list"></div>
            </div>

            <div id="tab-boss" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:18px; color:var(--red)">EMPIRE CONTROL</h2>
                <div style="grid-template-columns: 1fr 1fr; display:grid; gap:20px;">
                    <div style="background:#0d0d0d; padding:30px; border-radius:10px; border-left:5px solid var(--gold);">
                        <small>DOANH THU ĐA VŨ TRỤ</small>
                        <h1 id="rev" style="font-size:40px; margin-top:10px;">$0</h1>
                    </div>
                    <div style="background:#0d0d0d; padding:30px; border-radius:10px; border-left:5px solid var(--red);">
                        <small>LỆNH TRUY SÁT ĐÃ HOÀN THÀNH</small>
                        <h1 id="orders" style="font-size:40px; margin-top:10px;">0</h1>
                    </div>
                </div>
            </div>
        </main>

        <div class="pos-panel">
            <div class="cart-header">CURRENT LOADOUT</div>
            <div class="cart-items" id="cart-data"></div>
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span style="color:#555">SUBTOTAL:</span>
                    <h2 id="total-val" style="color:var(--gold)">$0</h2>
                </div>
                <button class="murt-btn" onclick="pay()">EXECUTE TRANSACTION</button>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="pay-box">
            <h3 style="margin-bottom:20px; font-family:'Syncopate'">PAYMENT ENCRYPTED</h3>
            <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <h2 id="vnd" style="color:var(--red); margin-bottom:30px;">0 VNĐ</h2>
            <button class="murt-btn" onclick="done()">CONFIRM SUCCESS</button>
            <button class="murt-btn" style="background:#eee; color:#000; margin-top:10px;" onclick="closePay()">CANCEL</button>
        </div>
    </div>

<script>
    // DỮ LIỆU VŨ KHÍ THẬT 100% CÓ ẢNH
    const weapons = [
        { id:1, cat:"Sniper Rifle", name:"Barrett M82A1 .50 BMG", price:18500, img:"https://www.militarytoday.com/firearms/barrett_m82.jpg" },
        { id:2, cat:"Assault Rifle", name:"Heckler & Koch HK416", price:4500, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/HK416_noBG.png/640px-HK416_noBG.png" },
        { id:3, cat:"Pistol", name:"Glock 17 John Wick Ed.", price:1200, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Glock_17_noBG.png/640px-Glock_17_noBG.png" },
        { id:4, cat:"SMG", name:"FN P90 Tactical", price:3200, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/P90_noBG.png/640px-P90_noBG.png" },
        { id:5, cat:"Shotgun", name:"Benelli M4 Super 90", price:2800, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Benelli_M4_noBG.png/640px-Benelli_M4_noBG.png" },
        { id:6, cat:"Cold Weapon", name:"Handmade Katana S1", price:5500, img:"https://pngimg.com/uploads/katana/katana_PNG43.png" }
    ];

    // Tự lấp đầy 100 món bằng thuật toán để tránh trống ảnh
    for(let i=7; i<=100; i++) {
        weapons.push({ id:i, cat:"Tactical Gear", name:`Combat Equipment #${100+i}`, price:Math.floor(Math.random()*8000)+1000, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Pistol_silencer.png/640px-Pistol_silencer.png" });
    }

    const assassins = [
        { name: "John Wick", rank: "High Table", bio: "Hạng Đỏ - Cận chiến và súng ngắn chuyên nghiệp.", avatar: "https://vignette.wikia.nocookie.net/john-wick/images/2/2f/John_Wick_Chapter_2.jpg" },
        { name: "Vincenzo Cassano", rank: "Consigliere", bio: "Hạng Tím - Vũ khí hạng nặng và phá hoại.", avatar: "https://upload.wikimedia.org/wikipedia/vi/0/05/Vincenzo_poster.jpg" },
        { name: "Jeong Jin-man", rank: "Owner", bio: "Hạng Vàng - Cung ứng khí tài đa vũ trụ.", avatar: "https://upload.wikimedia.org/wikipedia/en/3/36/A_Shop_for_Killers_poster.jpg" }
    ];

    let cart = [];
    let totalRev = 0;
    let totalOrders = 0;

    function login() {
        if(document.getElementById('pass').value === 'LuanLG' || document.getElementById('pass').value === 'LGPro') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            renderWeapons();
            renderVIPs();
        } else {
            Swal.fire('TRUY CẬP BỊ TỪ CHỐI', 'Sai mã bảo mật!', 'error');
        }
    }

    function renderWeapons() {
        document.getElementById('w-list').innerHTML = weapons.map(w => `
            <div class="w-card">
                <img src="${w.img}" class="w-img" onerror="this.src='https://via.placeholder.com/200/000/ff3c3c?text=GEAR'">
                <div class="w-cat">${w.cat}</div>
                <div class="w-name">${w.name}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <b style="color:var(--gold)">$${w.price.toLocaleString()}</b>
                    <button onclick="add(${w.id})" style="background:var(--red); border:none; color:white; width:35px; height:35px; border-radius:5px; cursor:pointer"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function renderVIPs() {
        document.getElementById('vip-list').innerHTML = assassins.map(v => `
            <div class="vip-card">
                <img src="${v.avatar}" class="vip-avatar" onerror="this.src='https://via.placeholder.com/60'">
                <div>
                    <h4 style="color:var(--gold)">${v.name} - <small style="color:#fff">${v.rank}</small></h4>
                    <p style="font-size:12px; color:#666; margin-top:5px;">${v.bio}</p>
                </div>
            </div>
        `).join('');
    }

    function add(id) {
        cart.push(weapons.find(w => w.id === id));
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-data').innerHTML = cart.map((i, idx) => `
            <div class="cart-item">
                <span>${i.name}</span>
                <b>$${i.price.toLocaleString()} <i class="fas fa-times" onclick="remove(${idx})" style="margin-left:10px; cursor:pointer; color:#333"></i></b>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-val').innerText = `$${total.toLocaleString()}`;
    }

    function remove(idx) { cart.splice(idx,1); updateCart(); }

    function pay() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        const vnd = total * 25450;
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd').innerText = vnd.toLocaleString() + " VNĐ";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${vnd}&addInfo=GIALUAN_MURTHELP`,
            width: 200, height: 200
        });
    }

    function done() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        totalRev += total;
        totalOrders++;
        document.getElementById('rev').innerText = `$${totalRev.toLocaleString()}`;
        document.getElementById('orders').innerText = totalOrders;
        cart = []; updateCart(); closePay();
        Swal.fire('GIAO DỊCH THÀNH CÔNG', 'Đã ghi nhận vào kho dữ liệu đế chế.', 'success');
    }

    function closePay() { document.getElementById('pay-modal').style.display = 'none'; }
    function showTab(id) {
        ['arsenal', 'vips', 'boss'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
        document.getElementById('tab-'+id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
