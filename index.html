<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MURTHELP | IP15 & LAPTOP EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #ff3c3c;
            --black: #050505;
            --panel: #0a0a0a;
            --gold: #facc15;
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--black);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* LOGIN GATE */
        #gate {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .gate-box { width: 90%; max-width: 400px; text-align: center; padding: 30px; border: 1px solid #222; }
        .gate-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; margin: 20px 0; text-align: center; }

        /* MAIN STRUCTURE */
        #app { display: none; height: 100vh; display: flex; flex-direction: column; }
        
        /* TOP NAV (Dùng cho cả 2 thiết bị) */
        header {
            height: 60px; background: var(--panel); border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            flex-shrink: 0;
        }

        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }

        /* SIDEBAR (Laptop hiển thị, Mobile ẩn vào Menu) */
        aside.sidebar {
            width: 240px; background: var(--panel); border-right: 1px solid #222;
            padding: 20px; transition: 0.3s;
        }

        /* CONTENT AREA */
        main.content { flex: 1; overflow-y: auto; padding: 20px; background: #080808; }
        .weapon-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }

        /* WEAPON CARD */
        .w-card {
            background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px;
            padding: 12px; text-align: center; position: relative;
        }
        .w-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .w-card h3 { font-size: 12px; margin-bottom: 5px; height: 34px; overflow: hidden; }
        .w-price { color: var(--gold); font-weight: bold; font-size: 14px; }
        .add-btn {
            width: 100%; padding: 8px; margin-top: 10px; background: var(--red);
            border: none; color: #fff; font-size: 10px; font-weight: bold; cursor: pointer;
        }

        /* RIGHT PANEL (LOADOUT) - TRỌNG TÂM CỦA VIỆC THU GỌN */
        .cart-panel {
            width: 350px; background: var(--panel); border-left: 1px solid #222;
            display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; z-index: 999;
        }

        /* Nút thu gọn trên Laptop */
        .collapse-trigger {
            position: absolute; left: -30px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 60px; background: var(--red);
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px 0 0 10px; cursor: pointer;
        }

        .cart-panel.hidden { transform: translateX(350px); width: 0; margin-left: 0; border: none; }

        /* RESPONSIVE CHO IPHONE 15 */
        @media (max-width: 768px) {
            aside.sidebar { display: none; }
            .cart-panel {
                position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh;
                border-left: none; border-top: 2px solid var(--red); border-radius: 20px 20px 0 0;
            }
            .cart-panel.active { bottom: 0; }
            .collapse-trigger { display: none; }
            
            /* Nút giỏ hàng nổi trên Mobile */
            #mobile-cart-btn {
                display: flex !important;
                position: fixed; bottom: 30px; right: 20px;
                width: 65px; height: 65px; background: var(--red);
                border-radius: 50%; align-items: center; justify-content: center;
                box-shadow: 0 10px 30px rgba(255, 60, 60, 0.5); z-index: 1000;
            }
            #mobile-cart-count {
                position: absolute; top: 0; right: 0; background: #fff;
                color: #000; width: 22px; height: 22px; border-radius: 50%;
                font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center;
            }
        }

        /* MODAL QR */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10001; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box { background: #fff; color: #000; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        
        .btn-pay { width: 100%; padding: 15px; background: var(--red); color: #fff; border: none; font-weight: bold; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="gate-box">
            <h1 style="font-family:'Syncopate'; color:var(--red)">MURTHELP</h1>
            <input type="password" id="pass" class="gate-input" placeholder="ACCESS CODE">
            <button class="add-btn" style="padding:15px" onclick="login()">AUTHORIZE</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="font-family:'Syncopate'; font-size:14px; color:var(--red)">MURTHELP.SYS</div>
            <div id="user-info" style="font-size:10px">ID: GIALUAN_ADMIN</div>
        </header>

        <div class="main-container">
            <aside class="sidebar">
                <p style="color:#444; margin-bottom:20px">CATEGORIES</p>
                <div style="color:var(--red)" onclick="render('ALL')">● ALL UNITS</div>
                <div style="color:var(--gold)" onclick="render('FIREARMS')">● FIREARMS</div>
                <div style="color:#a855f7" onclick="render('HEAVY')">● HEAVY</div>
            </aside>

            <main class="content">
                <div class="weapon-grid" id="weapon-list"></div>
            </main>

            <div class="cart-panel" id="cart-drawer">
                <div class="collapse-trigger" onclick="toggleCartLaptop()">
                    <i class="fas fa-chevron-right" id="arrow-icon"></i>
                </div>
                
                <div style="padding:25px; border-bottom:1px solid #222; display:flex; justify-content:space-between">
                    <span style="font-family:'Syncopate'; font-size:12px">LOADOUT</span>
                    <i class="fas fa-times" onclick="closeCartMobile()" style="cursor:pointer"></i>
                </div>

                <div id="cart-items-container" style="flex:1; overflow-y:auto; padding:20px">
                    </div>

                <div style="padding:25px; background:#0f0f0f; border-top:1px solid #222">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                        <span>TOTAL</span>
                        <span id="total-price" style="color:var(--gold); font-size:20px; font-weight:bold">$0</span>
                    </div>
                    <button class="btn-pay" onclick="openPayment()">EXECUTE PURCHASE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-cart-btn" style="display:none;" onclick="openCartMobile()">
        <i class="fas fa-shopping-cart" style="font-size:24px"></i>
        <div id="mobile-cart-count">0</div>
    </div>

    <div id="pay-modal" class="modal">
        <div class="modal-box">
            <h2 style="font-family:'Syncopate'">SECURE PAY</h2>
            <div id="qrcode"></div>
            <h1 id="vnd-val" style="color:var(--red)">0 VNĐ</h1>
            <p style="font-size:10px; color:#666">TRANS_ID: <span id="trans-id"></span></p>
            <button class="btn-pay" onclick="confirmPayment()">CONFIRM PAID</button>
            <button class="btn-pay" style="background:#ddd; color:#000" onclick="document.getElementById('pay-modal').style.display='none'">CANCEL</button>
        </div>
    </div>

<script>
    // --- DATABASE 100 LOẠI SÚNG ---
    const weapons = [];
    const types = ["FIREARMS", "HEAVY", "MELEE"];
    const images = [
        "https://www.pngplay.com/wp-content/uploads/13/Glock-17-PNG-Clipart-Background.png",
        "https://www.pngplay.com/wp-content/uploads/13/Sniper-Rifle-Transparent-Images.png",
        "https://purepng.com/public/uploads/large/purepng.com-assault-rifle-ak-47weaponassault-riflegun-941524672688u9kno.png"
    ];

    for(let i=1; i<=100; i++) {
        weapons.push({
            id: i,
            name: `Khí tài Tactical #${1000 + i}`,
            type: types[i % 3],
            price: Math.floor(Math.random() * 15000) + 800,
            img: images[i % 3]
        });
    }

    let cart = [];

    function login() {
        const p = document.getElementById('pass').value;
        if(p === 'LuanLG' || p === 'LGPro') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            render();
        } else {
            Swal.fire('Error', 'Access Denied', 'error');
        }
    }

    function render(filter = 'ALL') {
        const list = document.getElementById('weapon-list');
        list.innerHTML = '';
        const data = filter === 'ALL' ? weapons : weapons.filter(w => w.type === filter);
        
        data.forEach(w => {
            list.innerHTML += `
                <div class="w-card">
                    <img src="${w.img}">
                    <h3>${w.name}</h3>
                    <div class="w-price">$${w.price.toLocaleString()}</div>
                    <button class="add-btn" onclick="addToCart(${w.id})">ADD TO LOADOUT</button>
                </div>
            `;
        });
    }

    function addToCart(id) {
        const w = weapons.find(x => x.id === id);
        cart.push(w);
        updateUI();
    }

    function updateUI() {
        const container = document.getElementById('cart-items-container');
        container.innerHTML = cart.map((item, index) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:11px; border-bottom:1px solid #111; padding-bottom:5px">
                <span>${item.name}</span>
                <span style="color:var(--gold)">$${item.price}</span>
                <i class="fas fa-trash" onclick="remove(${index})" style="color:var(--red)"></i>
            </div>
        `).join('');

        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-price').innerText = `$${total.toLocaleString()}`;
        document.getElementById('mobile-cart-count').innerText = cart.length;
    }

    function remove(idx) {
        cart.splice(idx, 1);
        updateUI();
    }

    // --- LOGIC ĐIỀU KHIỂN BẢNG CHỨC NĂNG ---
    function toggleCartLaptop() {
        const panel = document.getElementById('cart-drawer');
        const icon = document.getElementById('arrow-icon');
        panel.classList.toggle('hidden');
        icon.classList.toggle('fa-chevron-left');
        icon.classList.toggle('fa-chevron-right');
    }

    function openCartMobile() { document.getElementById('cart-drawer').classList.add('active'); }
    function closeCartMobile() { document.getElementById('cart-drawer').classList.remove('active'); }

    // --- THANH TOÁN ---
    function openPayment() {
        if(cart.length === 0) return;
        const totalUSD = cart.reduce((s, i) => s + i.price, 0);
        const totalVND = totalUSD * 25450;
        const tid = "LGS" + Math.floor(Math.random()*99999);
        
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd-val').innerText = totalVND.toLocaleString() + " VNĐ";
        document.getElementById('trans-id').innerText = tid;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${totalVND}&addInfo=${tid}`,
            width: 200, height: 200
        });
    }

    function confirmPayment() {
        Swal.fire('SUCCESS', 'Giao dịch hoàn tất!', 'success');
        cart = [];
        updateUI();
        document.getElementById('pay-modal').style.display = 'none';
        closeCartMobile();
    }
</script>
</body>
</html>
