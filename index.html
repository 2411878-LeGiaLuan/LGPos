<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG-ARMORY | THỰC CHIẾN</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --main: #00f2ff; --bg: #050508; --card: #101015; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* Layout tối giản, tập trung vào việc bán hàng */
        .container { max-width: 600px; margin: 0 auto; }
        .header { border-bottom: 2px solid var(--main); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .item img { width: 60px; height: 60px; filter: drop-shadow(0 0 5px var(--main)); }
        .item-info { flex: 1; }
        .item-info h3 { margin: 0; font-size: 16px; color: var(--main); }
        .item-info p { margin: 5px 0; font-size: 14px; color: #aaa; }
        .btn-add { background: var(--main); color: #000; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Giỏ hàng hiện ngay tại trang chủ để dễ dùng */
        .cart-box { background: #1a1a20; border-radius: 15px; padding: 20px; border: 1px dashed var(--main); margin-top: 30px; }
        .cart-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .checkout-btn { width: 100%; background: #ffaa00; color: #000; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        #qr-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center; }
        .qr-content { background:#fff; padding:30px; border-radius:20px; text-align:center; color:#000; width:80%; max-width:350px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-weight:bold; letter-spacing:1px;">LG-ARMORY REAL-TIME</div>
        <div id="clock"></div>
    </div>

    <div id="product-list"></div>

    <div class="cart-box">
        <h2 style="margin-top:0; font-size:18px;"><i class="fas fa-shopping-cart"></i> ĐƠN HÀNG CỦA BẠN</h2>
        <div id="cart-display"><p style="color:#666;">Chưa có vũ khí nào được chọn...</p></div>
        <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:20px; font-weight:bold;">
            <span>TỔNG CỘNG:</span>
            <span id="total-price" style="color:#ffaa00;">0 $</span>
        </div>
        <button class="checkout-btn" onclick="openPayment()">THANH TOÁN NGAY</button>
    </div>
</div>

<div id="qr-modal">
    <div class="qr-content">
        <h3 style="margin-top:0;">QUÉT MÃ TRẢ TIỀN</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0;"></div>
        <h2 id="final-amount" style="color:red; margin:10px 0;"></h2>
        <p style="font-size:12px; color:#777;">Chụp màn hình sau khi chuyển khoản</p>
        <button onclick="closePayment()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; background:none; margin-top:10px;">QUAY LẠI</button>
        <button onclick="confirmOrder()" style="width:100%; padding:12px; background:#000; color:#fff; border-radius:8px; border:none; margin-top:10px; font-weight:bold;">XÁC NHẬN ĐÃ CHUYỂN</button>
    </div>
</div>

<script>
    const weapons = [
        { id: 1, name: 'XM210 Plasma Rifle', price: 15500, img: '🔫', stock: 25 },
        { id: 2, name: 'Nuclear Tsunami', price: 1200000, img: '🚀', stock: 4 },
        { id: 3, name: 'Titan Railgun', price: 45000, img: '🔭', stock: 12 }
    ];

    let myCart = [];

    function renderProducts() {
        document.getElementById('product-list').innerHTML = weapons.map(w => `
            <div class="item">
                <div style="font-size:30px;">${w.img}</div>
                <div class="item-info">
                    <h3>${w.name}</h3>
                    <p>Giá: $${w.price.toLocaleString()} | Kho: ${w.stock}</p>
                </div>
                <button class="btn-add" onclick="buy(${w.id})">CHỌN</button>
            </div>
        `).join('');
    }

    function buy(id) {
        const item = weapons.find(w => w.id === id);
        if(item.stock > 0) {
            item.stock--;
            myCart.push(item);
            updateCart();
            renderProducts();
        } else {
            Swal.fire('Hết hàng!', '', 'error');
        }
    }

    function updateCart() {
        const display = document.getElementById('cart-display');
        if(myCart.length === 0) {
            display.innerHTML = '<p style="color:#666;">Chưa có vũ khí nào được chọn...</p>';
            return;
        }
        display.innerHTML = myCart.map((item, index) => `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>$${item.price.toLocaleString()} <i class="fas fa-times" style="color:red; margin-left:10px;" onclick="remove(${index})"></i></span>
            </div>
        `).join('');
        
        const total = myCart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total-price').innerText = total.toLocaleString() + ' $';
    }

    function remove(index) {
        const item = myCart[index];
        weapons.find(w => w.id === item.id).stock++;
        myCart.splice(index, 1);
        updateCart();
        renderProducts();
    }

    function openPayment() {
        if(myCart.length === 0) return Swal.fire('Giỏ hàng trống!', '', 'warning');
        const totalUSD = myCart.reduce((sum, item) => sum + item.price, 0);
        const totalVND = totalUSD * 25400;

        document.getElementById('qr-modal').style.display = 'flex';
        document.getElementById('final-amount').innerText = totalVND.toLocaleString() + ' VNĐ';
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${totalVND}&addInfo=LGARMORY_GIALUAN`,
            width: 200, height: 200
        });
    }

    function closePayment() { document.getElementById('qr-modal').style.display = 'none'; }

    function confirmOrder() {
        closePayment();
        Swal.fire({
            title: 'Giao dịch đang xử lý!',
            text: 'Admin Gia Luân sẽ xác thực và vận chuyển hàng ngay.',
            icon: 'success',
            background: '#101015', color: '#fff'
        });
        myCart = [];
        updateCart();
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    renderProducts();
</script>
</body>
</html>
