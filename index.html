<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGShop POS Beyond Enterprise v11.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --p: #4f46e5; --dark: #020617; --success: #22c55e;
            --danger: #ef4444; --warning: #eab308; --bg: #fdfdfd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; color: #1e293b; }

        /* NEUMORPHIC SIDEBAR */
        .sidebar { 
            width: 100px; background: var(--dark); display: flex; flex-direction: column; 
            padding: 30px 0; gap: 15px; align-items: center; border-right: 1px solid #e2e8f0;
        }
        .nav-link { 
            color: #64748b; width: 65px; height: 65px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; gap: 5px;
        }
        .nav-link.active { background: var(--p); color: white; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); }
        .nav-link i { font-size: 22px; }
        .nav-link span { font-size: 9px; font-weight: 800; text-transform: uppercase; }

        /* MAIN CONTENT */
        .viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
        .header { 
            background: white; padding: 20px 40px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #e2e8f0;
        }
        .shop-id { font-size: 20px; font-weight: 900; background: linear-gradient(to right, var(--p), #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }

        /* POS GRID */
        .pos-layout { display: grid; grid-template-columns: 1fr 480px; gap: 30px; height: 100%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; align-content: start; }
        
        .p-card { 
            background: white; border-radius: 28px; padding: 25px; text-align: center; cursor: pointer;
            border: 2px solid transparent; transition: 0.3s; position: relative;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }
        .p-card:hover { border-color: var(--p); transform: translateY(-8px); }
        .p-card .emoji { font-size: 55px; display: block; margin-bottom: 15px; }
        .p-card .badge { position: absolute; top: 15px; right: 15px; background: #e0e7ff; color: var(--p); padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; }

        /* CART PANEL (PREMIUM) */
        .cart-panel { background: white; border-radius: 35px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .cart-body { flex: 1; padding: 25px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px; background: #f8fafc; border-radius: 20px; }
        
        .cart-footer { padding: 30px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .total-area { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .btn-checkout { 
            width: 100%; padding: 22px; border-radius: 22px; border: none; background: var(--dark); 
            color: white; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-checkout:hover { background: var(--p); letter-spacing: 1px; }

        /* LOYALTY SECTION */
        .loyalty-card { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }

        /* REPORT WIDGETS */
        .stat-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 30px; border: 1px solid #f1f5f9; position: relative; overflow: hidden; }
        .stat-card::before { content:''; position: absolute; left: 0; top:0; width: 6px; height: 100%; background: var(--p); }

        /* TABLE UI */
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .table-btn { 
            height: 120px; border-radius: 25px; background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: 2px solid #f1f5f9;
        }
        .table-btn.active { border-color: var(--danger); background: #fef2f2; color: var(--danger); }
        .table-btn i { font-size: 28px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-link active" onclick="show('pos', this)"><i class="fas fa-cash-register"></i><span>POS</span></div>
        <div class="nav-link" onclick="show('orders', this)"><i class="fas fa-list-ul"></i><span>Đơn hàng</span></div>
        <div class="nav-link" onclick="show('tables', this)"><i class="fas fa-th-large"></i><span>Phòng bàn</span></div>
        <div class="nav-link" onclick="show('analytics', this)"><i class="fas fa-chart-line"></i><span>Báo cáo</span></div>
        <div class="nav-link" onclick="resetSys()"><i class="fas fa-power-off"></i><span>Đóng ca</span></div>
    </div>

    <div class="viewport">
        <div class="header">
            <div class="shop-id">LGSHOP PREMIUM v11.0</div>
            <div style="display: flex; gap: 25px; align-items: center;">
                <div style="text-align: right;"><b id="live-clock"></b><br><small>Hôm nay: <span id="current-date"></span></small></div>
                <div style="background: #e0e7ff; color: var(--p); padding: 10px 20px; border-radius: 15px; font-weight: 800;">ADMIN: GIA LUÂN</div>
            </div>
        </div>

        <div class="content">
            <div id="pos" class="page active">
                <div class="pos-layout">
                    <div class="menu-grid" id="main-menu"></div>
                    <div class="cart-panel">
                        <div class="cart-body">
                            <div class="loyalty-card">
                                <i class="fas fa-crown" style="color:var(--warning); font-size:24px"></i>
                                <div><small>Khách hàng thành viên</small><br><b>Tích điểm 5% cho mỗi đơn</b></div>
                            </div>
                            <h3 style="margin-bottom:20px; font-weight:900">GIỎ HÀNG</h3>
                            <div id="cart-items-box"></div>
                        </div>
                        <div class="cart-footer">
                            <div class="total-area">
                                <span style="font-weight:700; color:#64748b">TỔNG CỘNG</span>
                                <b id="cart-total" style="font-size:35px; color:var(--dark)">0 đ</b>
                            </div>
                            <div style="display:flex; gap:10px; margin-bottom:20px">
                                <button onclick="setMethod('Cash')" id="m-cash" style="flex:1; padding:15px; border-radius:15px; border:2px solid var(--p); background:#eef2ff; color:var(--p); font-weight:800; cursor:pointer">💵 TIỀN MẶT</button>
                                <button onclick="setMethod('QR')" id="m-qr" style="flex:1; padding:15px; border-radius:15px; border:2px solid #e2e8f0; background:white; font-weight:800; cursor:pointer">📲 CHUYỂN QR</button>
                            </div>
                            <button class="btn-checkout" onclick="checkout()">XUẤT HÓA ĐƠN</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tables" class="page">
                <h2 style="margin-bottom:30px">Quản lý khu vực bàn</h2>
                <div class="table-grid" id="table-box"></div>
            </div>

            <div id="analytics" class="page">
                <div class="stat-group">
                    <div class="stat-card"><small>Doanh thu ca</small><h2 id="st-rev">0 đ</h2></div>
                    <div class="stat-card"><small>Đã phục vụ</small><h2 id="st-orders">0 Đơn</h2></div>
                    <div class="stat-card"><small>Điểm Loyalty</small><h2>1,250 P</h2></div>
                    <div class="stat-card"><small>Món Hot</small><h2 id="st-hot" style="color:var(--p)">--</h2></div>
                </div>
                <div style="background:white; padding:40px; border-radius:35px; height:450px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                    <canvas id="premiumChart"></canvas>
                </div>
            </div>

            <div id="orders" class="page">
                <h2 style="margin-bottom:25px">Nhật ký giao dịch</h2>
                <div id="order-log-full" style="display:flex; flex-direction:column; gap:10px"></div>
            </div>
        </div>
    </div>

<script>
    // --- DATABASE ---
    let products = JSON.parse(localStorage.getItem('LG_P_v11')) || [
        { id: 1, name: 'Hồng Trà Macchiato', price: 35000, emoji: '🧋', sold: 0 },
        { id: 2, name: 'Latte Hạnh Nhân', price: 55000, emoji: '☕', sold: 0 },
        { id: 3, name: 'Matcha Đá Xay', price: 65000, emoji: '🍵', sold: 0 },
        { id: 4, name: 'Bánh Sừng Bò', price: 45000, emoji: '🥐', sold: 0 },
        { id: 5, name: 'Trà Nhãn Quế', price: 40000, emoji: '🍹', sold: 0 }
    ];
    let tables = Array.from({length: 12}, (_, i) => ({ id: i+1, busy: false }));
    let orders = JSON.parse(localStorage.getItem('LG_O_v11')) || [];
    let cart = [];
    let payMethod = 'Cash';

    // --- CORE ---
    function init() {
        renderMenu();
        renderTables();
        updateStats();
        startTime();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN');
    }

    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'analytics') initChart();
        if(id === 'orders') renderOrders();
    }

    function renderMenu() {
        document.getElementById('main-menu').innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <span class="badge">HOT</span>
                <span class="emoji">${p.emoji}</span>
                <b style="font-size:16px">${p.name}</b>
                <p style="color:var(--p); font-weight:900; margin-top:10px">${p.price.toLocaleString()} đ</p>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push({...p});
        updateCart();
        new Audio('https://www.soundjay.com/buttons/button-21.mp3').play().catch(()=>{});
    }

    function updateCart() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-items-box').innerHTML = cart.map((i, idx) => `
            <div class="cart-item">
                <div><b>${i.name}</b><br><small>${i.price.toLocaleString()} đ</small></div>
                <i class="fas fa-minus-circle" style="color:var(--danger); cursor:pointer" onclick="removeFromCart(${idx})"></i>
            </div>
        `).join('');
        document.getElementById('cart-total').innerText = total.toLocaleString() + ' đ';
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        updateCart();
    }

    function setMethod(m) {
        payMethod = m;
        document.getElementById('m-cash').style = m === 'Cash' ? 'flex:1; padding:15px; border-radius:15px; border:2px solid var(--p); background:#eef2ff; color:var(--p); font-weight:800;' : 'flex:1; padding:15px; border-radius:15px; border:2px solid #e2e8f0; background:white; font-weight:800;';
        document.getElementById('m-qr').style = m === 'QR' ? 'flex:1; padding:15px; border-radius:15px; border:2px solid var(--p); background:#eef2ff; color:var(--p); font-weight:800;' : 'flex:1; padding:15px; border-radius:15px; border:2px solid #e2e8f0; background:white; font-weight:800;';
    }

    function checkout() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        
        Swal.fire({
            title: 'LGSHOP CHECKOUT',
            text: `Thanh toán ${total.toLocaleString()} đ qua ${payMethod === 'Cash' ? 'Tiền mặt' : 'QR Code'}?`,
            icon: 'info',
            showCancelButton: true,
            confirmButtonText: 'XUẤT BILL'
        }).then(res => {
            if(res.isConfirmed) {
                const order = {
                    id: '#' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                    total,
                    method: payMethod,
                    items: [...cart],
                    time: new Date().toLocaleTimeString()
                };
                
                cart.forEach(c => {
                    const p = products.find(x => x.id === c.id);
                    p.sold++;
                });

                orders.unshift(order);
                localStorage.setItem('LG_O_v11', JSON.stringify(orders));
                localStorage.setItem('LG_P_v11', JSON.stringify(products));

                Swal.fire('Thành công', 'Hóa đơn đã được gửi tới hệ thống KDS.', 'success');
                cart = []; updateCart(); updateStats();
            }
        });
    }

    function renderTables() {
        document.getElementById('table-box').innerHTML = tables.map(t => `
            <div class="table-btn ${t.busy ? 'active' : ''}" onclick="toggleTable(${t.id})">
                <i class="fas fa-couch"></i>
                <b>BÀN ${t.id}</b>
                <small>${t.busy ? 'CÓ KHÁCH' : 'TRỐNG'}</small>
            </div>
        `).join('');
    }

    function toggleTable(id) {
        const t = tables.find(x => x.id === id);
        t.busy = !t.busy;
        renderTables();
    }

    function updateStats() {
        const rev = orders.reduce((s, o) => s + o.total, 0);
        document.getElementById('st-rev').innerText = rev.toLocaleString() + ' đ';
        document.getElementById('st-orders').innerText = orders.length + ' Đơn';
        
        let hot = products.reduce((prev, current) => (prev.sold > current.sold) ? prev : current);
        document.getElementById('st-hot').innerText = hot.sold > 0 ? hot.name : '--';
    }

    function initChart() {
        const ctx = document.getElementById('premiumChart').getContext('2d');
        if(window.lgChart) window.lgChart.destroy();
        window.lgChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00'],
                datasets: [{
                    label: 'Doanh thu (VNĐ)',
                    data: [200000, 850000, 1500000, 1100000, 2400000, 4200000, 5800000],
                    borderColor: '#4f46e5',
                    tension: 0.4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.1)'
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function renderOrders() {
        document.getElementById('order-log-full').innerHTML = orders.map(o => `
            <div style="background:white; padding:20px; border-radius:15px; display:flex; justify-content:space-between">
                <div><b>${o.id}</b> | ${o.time}</div>
                <div style="font-weight:900">${o.total.toLocaleString()} đ <small>(${o.method})</small></div>
            </div>
        `).join('');
    }

    function startTime() {
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('vi-VN');
        }, 1000);
    }

    function resetSys() {
        Swal.fire({
            title: 'ĐÓNG CA LÀM VIỆC?',
            text: "Toàn bộ dữ liệu hôm nay sẽ được lưu trữ.",
            icon: 'warning',
            showCancelButton: true
        }).then(res => { if(res.isConfirmed) { localStorage.clear(); location.reload(); } });
    }

    init();
</script>
</body>
</html>
