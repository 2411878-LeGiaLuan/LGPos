<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LGSHOPCOMPANY | SECURE SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --red: #ff3c3c; --gold: #facc15; --black: #0a0a0a; }
        body { background: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Giao diện đăng nhập an toàn */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: #111; padding: 40px; border-radius: 10px; 
            border: 1px solid var(--red); text-align: center; box-shadow: 0 0 20px rgba(255,60,60,0.2);
        }
        input[type="password"] {
            width: 100%; padding: 12px; margin: 20px 0;
            background: #000; border: 1px solid #444; color: var(--gold);
            font-size: 18px; text-align: center; border-radius: 5px;
        }
        .btn-main {
            background: var(--red); color: white; border: none;
            padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 5px;
        }

        /* Dashboard chính */
        #main-app { display: none; padding: 20px; }
        .header { border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; }
        
        /* CSS để tạo hình mô phỏng nếu ảnh bị lỗi */
        .gun-placeholder {
            width: 100%; height: 100px; background: #222; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555;
            border: 1px dashed #444; position: relative;
        }
        .gun-placeholder::after { content: 'IMAGE_LOADED_SECURELY'; color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color:var(--red); letter-spacing: 5px;">LGSHOP</h1>
            <p style="font-size: 12px; color: #666;">ENCRYPTED CONNECTION REQUIRED</p>
            <input type="password" id="accessKey" placeholder="Mật khẩu: LuanLG">
            <button class="btn-main" onclick="checkLogin()">XÁC MINH DANH TÍNH</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <h2 style="color: var(--gold);">ARSENAL V4.0</h2>
            <button class="btn-main" style="background:#333" onclick="location.reload()">ĐĂNG XUẤT</button>
        </div>

        <div class="grid" id="weaponList"></div>
    </div>

<script>
    // Dữ liệu súng với link ảnh dự phòng
    const data = [
        { name: "M416 FULL TACTICAL", price: 5000, img: "https://i.imgur.com/eG9V3U4.png" },
        { name: "AWM SNIPER MAGNUM", price: 25000, img: "https://i.imgur.com/8QnU9mB.png" },
        { name: "AKM MODERNIZED", price: 4500, img: "https://i.imgur.com/M6L2MOf.png" },
        { name: "KAR98K CLASSIC", price: 12000, img: "https://i.imgur.com/n6X6T3v.png" }
    ];

    function login() {
        const key = document.getElementById('accessKey').value;
        if(key === "LuanLG") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadWeapons();
        } else {
            Swal.fire({ icon: 'error', title: 'SAI MẬT KHẨU', background: '#111', color: '#fff' });
        }
    }

    // Gán phím Enter để đăng nhập nhanh
    document.getElementById('accessKey').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login();
    });

    function loadWeapons() {
        const list = document.getElementById('weaponList');
        list.innerHTML = data.map(item => `
            <div class="card">
                <div class="gun-placeholder">
                    <img src="${item.img}" style="width:100%; height:100%; object-fit:contain" 
                         onerror="this.style.display='none'">
                </div>
                <div class="w-name">${item.name}</div>
                <div class="w-price">$${item.price.toLocaleString()}</div>
                <button class="btn-main" style="width:100%; margin-top:10px; font-size:12px;" 
                        onclick="buy('${item.name}')">MUA NGAY</button>
            </div>
        `).join('');
    }

    function buy(name) {
        Swal.fire({
            title: 'XÁC NHẬN MUA',
            text: `Bạn muốn mua ${name}?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'ĐỒNG Ý',
            background: '#111',
            color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire('THÀNH CÔNG', 'Đơn hàng đã được ghi nhận!', 'success');
            }
        });
    }

    // Đổi tên hàm để tránh nhầm lẫn
    window.checkLogin = login;
</script>
</body>
</html>
