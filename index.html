<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGShop Pro v12.0 - Global Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --accent: #6366f1; --dark-bg: #0f172a; --panel: #ffffff;
            --success: #22c55e; --warning: #f59e0b; --text: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f1f5f9; display: flex; height: 100vh; overflow: hidden; color: var(--text); }

        /* SIDEBAR PRO */
        .sidebar { width: 90px; background: var(--dark-bg); display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .nav-btn { width: 60px; height: 60px; border-radius: 18px; color: #64748b; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; gap: 4px; }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        /* MAIN APP */
        .app-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 75px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; padding: 0 35px; }
        .brand { font-size: 22px; font-weight: 900; background: linear-gradient(45deg, var(--accent), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .view-content { flex: 1; padding: 25px; overflow-y: auto; }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* POS LAYOUT */
        .pos-layout { display: grid; grid-template-columns: 1fr 450px; gap: 25px; height: 100%; }
        .menu-section { display: flex; flex-direction: column; gap: 20px; }
        .search-box { background: white; padding: 12px 20px; border-radius: 15px; border: 1px solid #e2e8f0; display: flex; gap: 12px; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 15px; font-weight: 600; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; }
        .p-card { background: white; border-radius: 22px; padding: 20px; text-align: center; border: 2px solid transparent; transition: 0.3s; position: relative; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .p-card:hover { border-color: var(--accent); transform: scale(1.03); }
        .p-card .emoji { font-size: 45px; display: block; margin-bottom: 10px; }
        .p-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
        .p-card .stock-tag { position: absolute; top: 12px; left: 12px; font-size: 10px; background: #f1f5f9; padding: 4px 8px; border-radius: 8px; font-weight: 800; }

        /* BILLING PANEL */
        .billing-panel { background: white; border-radius: 30px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); overflow: hidden; }
        .bill-body { flex: 1; padding: 25px; overflow-y: auto; }
        .bill-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px; background: #f8fafc; border-radius: 18px; }
        
        .bill-footer { padding: 30px; border-top: 1px solid #f1f5f9; background: #f8fafc; }
        .pay-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .pay-btn { padding: 14px; border-radius: 15px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 800; transition: 0.2s; font-size: 13px; }
        .pay-btn.active { border-color: var(--accent); background: #eef2ff; color: var(--accent); }

        .checkout-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--dark-bg); color: white; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3); }
        .checkout-btn:hover { background: var(--accent); }

        /* KDS VIEW */
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .kds-ticket { background: #fffbeb; border: 2px solid #fef3c7; border-radius: 20px; padding: 20px; position: relative; }
        .kds-ticket.done { opacity: 0.5; background: #f0fdf4; border-color: #dcfce7; }
        .ticket-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #f59e0b; padding-bottom: 10px; margin-bottom: 10px; font-weight: 800; }

        /* ANALYTICS */
        .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .s-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .s-card b { font-size: 26px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-btn active" onclick="nav('pos', this)"><i class="fas fa-cash-register"></i><span>Bán</span></div>
        <div class="nav-btn" onclick="nav('kds', this)"><i class="fas fa-utensils"></i><span>Bếp</span></div>
        <div class="nav-btn" onclick="nav('inventory', this)"><i class="fas fa-boxes-stacked"></i><span>Kho</span></div>
        <div class="nav-btn" onclick="nav('reports', this)"><i class="fas fa-chart-line"></i><span>Báo cáo</span></div>
    </div>

    <div class="app-container">
        <div class="top-nav">
            <div class="brand">LGSHOP PRO v12.0 <span style="font-size: 10px; color: #64748b; font-weight: 600;">GLOBAL VISION</span></div>
            <div style="display: flex; gap: 25px; align-items: center;">
                <div style="text-align: right;"><b id="clock">00:00:00</b><br><small id="date"></small></div>
                <div style="width: 45px; height: 45px; border-radius: 14px; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 900;">GL</div>
            </div>
        </div>

        <div class="view-content">
            <div id="pos" class="page active">
                <div class="pos-layout">
                    <div class="menu-section">
                        <div class="search-box">
                            <i class="fas fa-search" style="color: #94a3b8;"></i>
                            <input type="text" id="m-search" placeholder="Tìm tên món hoặc mã vạch..." onkeyup="filterMenu()">
                        </div>
                        <div class="product-grid" id="product-list"></div>
                    </div>
                    <div class="billing-panel">
                        <div style="padding: 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;">
                            <h3 style="font-weight: 800;">ĐƠN HÀNG #<span id="order-id"></span></h3>
                            <button onclick="clearCart()" style="border:none; color:red; font-weight:700; background:none; cursor:pointer;">Xóa hết</button>
                        </div>
                        <div class="bill-body" id="cart-items"></div>
                        <div class="bill-footer">
                            <div class="pay-selector">
                                <button class="pay-btn active" id="m-cash" onclick="setPay('Tiền mặt')">💵 TIỀN MẶT</button>
                                <button class="pay-btn" id="m-qr" onclick="setPay('Quét QR')">📲 VIETQR</button>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
                                <span style="font-weight: 700; color: #64748b;">TỔNG THANH TOÁN</span>
                                <b style="font-size: 30px; color: var(--accent);" id="total-val">0 đ</b>
                            </div>
                            <button class="checkout-btn" onclick="handleCheckout()">THANH TOÁN & ĐẨY XUỐNG BẾP</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="kds" class="page">
                <h2 style="margin-bottom: 25px;">Hệ thống hiển thị nhà bếp (KDS)</h2>
                <div class="kds-grid" id="kds-container"></div>
            </div>

            <div id="reports" class="page">
                <div class="stat-row">
                    <div class="s-card"><small>Doanh thu ca</small><b id="st-rev">0 đ</b></div>
                    <div class="s-card"><small>Đơn hoàn tất</small><b id="st-count">0</b></div>
                    <div class="s-card"><small>Tồn kho thấp</small><b style="color: var(--danger);">3 Món</b></div>
                    <div class="s-card"><small>Khách thành viên</small><b>12</b></div>
                </div>
                <div style="background: white; padding: 35px; border-radius: 30px; height: 450px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- DATABASE ---
    let menu = JSON.parse(localStorage.getItem('LGS_P12')) || [
        { id: 1, name: 'Hồng Trà Sữa Pro', price: 35000, emoji: '🧋', stock: 88 },
        { id: 2, name: 'Cafe Muối Biển', price: 45000, emoji: '☕', stock: 12 },
        { id: 3, name: 'Trà Nhãn Sen', price: 55000, emoji: '🍹', stock: 45 },
        { id: 4, name: 'Bánh Mì Pate GL', price: 25000, emoji: '🥖', stock: 5 }
    ];
    let cart = [];
    let kdsOrders = [];
    let history = JSON.parse(localStorage.getItem('LGS_H12')) || [];
    let method = 'Tiền mặt';

    // --- CORE LOGIC ---
    function init() {
        renderMenu();
        updateDisplay();
        genID();
        updateTime();
        setInterval(updateTime, 1000);
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'reports') renderChart();
        if(id === 'kds') renderKDS();
    }

    function renderMenu() {
        document.getElementById('product-list').innerHTML = menu.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <span class="stock-tag">Tồn: ${p.stock}</span>
                <span class="emoji">${p.emoji}</span>
                <h4>${p.name}</h4>
                <b style="color:var(--accent)">${p.price.toLocaleString()} đ</b>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = menu.find(x => x.id === id);
        if(p.stock <= 0) return Swal.fire('Hết hàng', 'Món này đã tạm hết!', 'error');
        cart.push({...p});
        updateCartUI();
    }

    function updateCartUI() {
        const box = document.getElementById('cart-items');
        box.innerHTML = cart.map((i, idx) => `
            <div class="bill-item">
                <div><b>${i.name}</b><br><small>${i.price.toLocaleString()}</small></div>
                <i class="fas fa-minus-circle" style="color:red; cursor:pointer" onclick="removeFromCart(${idx})"></i>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-val').innerText = total.toLocaleString() + ' đ';
    }

    function removeFromCart(idx) { cart.splice(idx, 1); updateCartUI(); }

    function setPay(m) {
        method = m;
        document.getElementById('m-cash').classList.toggle('active', m === 'Tiền mặt');
        document.getElementById('m-qr').classList.toggle('active', m === 'Quét QR');
    }

    function handleCheckout() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        const orderId = document.getElementById('order-id').innerText;

        if(method === 'Quét QR') {
            Swal.fire({
                title: 'Quét VietQR',
                html: `<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=LGSHOP_${orderId}_${total}" style="border-radius:15px">`,
                confirmButtonText: 'XÁC NHẬN ĐÃ NHẬN TIỀN'
            }).then(finalize);
        } else {
            finalize();
        }
    }

    function finalize() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        const order = { id: document.getElementById('order-id').innerText, items: [...cart], total, time: new Date().toLocaleTimeString() };
        
        // Push to KDS
        kdsOrders.push({...order, status: 'pending'});
        // Update Inventory & History
        cart.forEach(c => { const p = menu.find(x => x.id === c.id); p.stock--; });
        history.push(order);
        
        localStorage.setItem('LGS_H12', JSON.stringify(history));
        localStorage.setItem('LGS_P12', JSON.stringify(menu));

        Swal.fire('Thành công', 'Đơn đã được đẩy xuống bếp!', 'success');
        cart = []; updateCartUI(); genID(); updateDisplay(); renderMenu();
    }

    // --- KDS RENDER ---
    function renderKDS() {
        const container = document.getElementById('kds-container');
        container.innerHTML = kdsOrders.map((o, idx) => `
            <div class="kds-ticket ${o.status === 'done' ? 'done' : ''}">
                <div class="ticket-header">
                    <span>ĐƠN #${o.id}</span>
                    <span>${o.time}</span>
                </div>
                <div>${o.items.map(i => `• ${i.name}`).join('<br>')}</div>
                <button onclick="finishTicket(${idx})" style="margin-top:15px; width:100%; padding:10px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:800; cursor:pointer">HOÀN THÀNH</button>
            </div>
        `).join('');
    }

    function finishTicket(idx) {
        kdsOrders[idx].status = 'done';
        renderKDS();
    }

    // --- DISPLAY HELPER ---
    function updateDisplay() {
        const rev = history.reduce((s, o) => s + o.total, 0);
        document.getElementById('st-rev').innerText = rev.toLocaleString() + ' đ';
        document.getElementById('st-count').innerText = history.length;
    }
    function genID() { document.getElementById('order-id').innerText = Math.floor(Math.random()*900000 + 100000); }
    function updateTime() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
        document.getElementById('date').innerText = new Date().toLocaleDateString('vi-VN');
    }

    function renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00'],
                datasets: [{
                    label: 'Doanh thu triệu đồng',
                    data: [1.2, 2.5, 4.8, 3.2, 5.5, 7.8, 8.2],
                    borderColor: '#6366f1',
                    tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)'
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    init();
</script>
</body>
</html>
