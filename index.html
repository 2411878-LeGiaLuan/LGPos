<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGSHOPCOMPANY | ARSENAL REALISTIC</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff3c3c; --gold: #facc15; --black: #050505; --dark: #0d0d0d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* LOGIN */
        #login-gate { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .gate-logo { font-family: 'Syncopate'; font-size: 32px; color: var(--red); margin-bottom: 30px; letter-spacing: 5px; }
        .murt-input { width: 350px; padding: 18px; background: #0a0a0a; border: 1px solid #222; color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none; }
        .murt-btn { width: 350px; padding: 18px; background: var(--red); border: none; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; }

        /* LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr 380px; }
        aside { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .nav-item { padding: 25px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 13px; color: #555; transition: 0.3s; }
        .nav-item.active { background: #111; color: var(--red); border-left: 5px solid var(--red); }

        main { overflow-y: auto; padding: 30px; background: #050505; }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        /* WEAPON CARD */
        .w-card { background: var(--dark); border: 1px solid #222; padding: 15px; border-radius: 8px; transition: 0.3s; position: relative; }
        .w-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .w-img-box { width: 100%; height: 130px; background: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .w-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .w-name { font-weight: 800; font-size: 13px; color: #fff; margin-bottom: 10px; height: 35px; text-transform: uppercase; }
        .w-price { color: var(--gold); font-size: 18px; font-weight: 900; }

        /* POS */
        .pos-panel { background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-header { padding: 25px; font-family: 'Syncopate'; font-size: 12px; color: var(--red); border-bottom: 1px solid #1a1a1a; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .total-box { padding: 30px; border-top: 2px solid var(--red); background: #000; }

        /* MODAL */
        #pay-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        .pay-box { background: #fff; padding: 40px; border-radius: 10px; text-align: center; color: #000; width: 420px; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="gate-logo">LG-ARSENAL</div>
        <input type="password" id="pass" class="murt-input" placeholder="ACCESS KEY">
        <button class="murt-btn" onclick="login()">INITIALIZE</button>
    </div>

    <div id="app">
        <aside>
            <div style="padding: 30px; font-family: 'Syncopate'; color: var(--red); font-size: 11px;">MURTHELP | ADMIN</div>
            <div class="nav-item active" onclick="showTab('arsenal')"><i class="fas fa-crosshairs"></i> ARSENAL</div>
            <div class="nav-item" onclick="showTab('vips')"><i class="fas fa-user-shield"></i> VIPS</div>
            <div class="nav-item" onclick="showTab('boss')"><i class="fas fa-crown"></i> BOSS HUB</div>
            <div class="nav-item" style="margin-top:auto; color:#222" onclick="location.reload()"><i class="fas fa-power-off"></i> LOGOUT</div>
        </aside>

        <main>
            <div id="tab-arsenal">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:16px; color:var(--gold)">WEAPON INVENTORY</h2>
                <div class="weapon-grid" id="w-list"></div>
            </div>

            <div id="tab-vips" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:16px; color:var(--red)">ELITE ASSASSINS</h2>
                <div id="vip-list"></div>
            </div>

            <div id="tab-boss" style="display:none;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:16px; color:var(--red)">REVENUE STATUS</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="background:var(--dark); padding:30px; border-radius:10px; border-top:4px solid var(--gold);">
                        <small>TOTAL EARNED</small>
                        <h1 id="rev" style="font-size:35px; margin-top:10px;">$0</h1>
                    </div>
                    <div style="background:var(--dark); padding:30px; border-radius:10px; border-top:4px solid var(--red);">
                        <small>CONTRACTS</small>
                        <h1 id="orders" style="font-size:35px; margin-top:10px;">0</h1>
                    </div>
                </div>
            </div>
        </main>

        <div class="pos-panel">
            <div class="cart-header">SELECTED GEAR</div>
            <div class="cart-items" id="cart-data"></div>
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span style="color:#555">TOTAL:</span>
                    <h2 id="total-val" style="color:var(--gold)">$0</h2>
                </div>
                <button class="murt-btn" onclick="pay()" style="width:100%">GENERATE INVOICE</button>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="pay-box">
            <h3 style="margin-bottom:20px; font-family:'Syncopate'">PAYMENT QR</h3>
            <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <h2 id="vnd" style="color:var(--red); margin-bottom:30px;">0 VNĐ</h2>
            <button class="murt-btn" onclick="done()" style="width:100%">VERIFY DEAL</button>
            <button class="murt-btn" style="background:#eee; color:#000; margin-top:10px; width:100%" onclick="closePay()">CANCEL</button>
        </div>
    </div>

<script>
    // DỮ LIỆU VŨ KHÍ - DÙNG LINK ẢNH DỰ PHÒNG CHUYÊN NGHIỆP (GITHUB & CDN)
    const db = [
        { id:1, n:"Barrett M82 Sniper", p:18500, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/m82.png" },
        { id:2, n:"M416 Assault Rifle", p:4500, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/hk416.png" },
        { id:3, n:"Glock 18 Tactical", p:1200, img:"https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/glock.png" },
        { id:4, n:"AWM Magnum Sniper", p:22000, img:"https://www.pngarts.com/files/3/Sniper-Rifle-PNG-Transparent-Image.png" },
        { id:5, n:"AK-47 Kalashnikov", p:3800, img:"https://www.pngarts.com/files/11/AK-47-PNG-Download-Image.png" },
        { id:6, n:"Katana Damascus", p:5500, img:"https://www.pngarts.com/files/4/Katana-PNG-High-Quality-Image.png" },
        { id:7, n:"Kar98k Sniper", p:12000, img:"https://www.pngarts.com/files/3/Sniper-Rifle-PNG-Image.png" },
        { id:8, n:"Desert Eagle .50", p:2200, img:"https://www.pngarts.com/files/11/Gun-PNG-Images-Free-Download.png" },
        { id:9, n:"MP5 SMG Tactical", p:2800, img:"https://www.pngarts.com/files/11/Gun-PNG-High-Quality-Image.png" },
        { id:10, n:"Tactical Knife", p:500, img:"https://www.pngarts.com/files/3/Combat-Knife-PNG-Free-Download.png" }
    ];

    const weapons = [];
    for(let i=0; i<100; i++) {
        const base = db[i % db.length];
        weapons.push({ id:i+1, n:`${base.n} Mk.${i+1}`, p:base.p + (i*10), img:base.img });
    }

    const assassins = [
        { name: "John Wick", rank: "High Table", avatar: "https://i.ibb.co/h7R905g/johnwick.jpg" },
        { name: "Jeong Jin-man", rank: "Admin", avatar: "https://i.ibb.co/L5Yp5xS/jinman.jpg" }
    ];

    let cart = []; let totalRev = 0; let totalOrders = 0;

    function login() {
        const p = document.getElementById('pass').value;
        if(p === 'LuanLG' || p === 'LGPro') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            renderWeapons(); renderVIPs();
        } else { Swal.fire('Error', 'Invalid Key!', 'error'); }
    }

    function renderWeapons() {
        document.getElementById('w-list').innerHTML = weapons.map(w => `
            <div class="w-card">
                <div class="w-img-box">
                    <img src="${w.img}" class="w-img" onerror="this.src='https://res.cloudinary.com/dxfq3iotg/image/upload/v1562074313/m82.png'">
                </div>
                <div class="w-name">${w.n}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b class="w-price">$${w.p.toLocaleString()}</b>
                    <button onclick="add(${w.id})" style="background:var(--red); border:none; color:white; padding:8px 12px; border-radius:4px; cursor:pointer"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function renderVIPs() {
        document.getElementById('vip-list').innerHTML = assassins.map(v => `
            <div style="background:#0d0d0d; padding:20px; border-radius:10px; margin-bottom:10px; display:flex; align-items:center; gap:20px; border:1px solid #222;">
                <div style="width:50px; height:50px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user-secret" style="color:#000"></i></div>
                <div>
                    <h4 style="color:var(--gold)">${v.name}</h4>
                    <small>${v.rank}</small>
                </div>
            </div>
        `).join('');
    }

    function add(id) { cart.push(weapons.find(w => w.id === id)); updateCart(); }
    function remove(idx) { cart.splice(idx,1); updateCart(); }

    function updateCart() {
        document.getElementById('cart-data').innerHTML = cart.map((i, idx) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:11px; border-bottom:1px solid #111; padding-bottom:8px;">
                <span>${i.n}</span>
                <b>$${i.p.toLocaleString()} <i class="fas fa-trash" onclick="remove(${idx})" style="margin-left:8px; cursor:pointer; color:#333"></i></b>
            </div>
        `).join('');
        const total = cart.reduce((s, i) => s + i.p, 0);
        document.getElementById('total-val').innerText = `$${total.toLocaleString()}`;
    }

    function pay() {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.p, 0);
        const vnd = total * 25450;
        document.getElementById('pay-modal').style.display = 'flex';
        document.getElementById('vnd').innerText = vnd.toLocaleString() + " VNĐ";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `https://img.vietqr.io/image/970422-0348710332-compact.jpg?amount=${vnd}&addInfo=GIALUAN_MURTHELP`, width: 200, height: 200 });
    }

    function done() {
        totalRev += cart.reduce((s, i) => s + i.p, 0);
        totalOrders++;
        document.getElementById('rev').innerText = `$${totalRev.toLocaleString()}`;
        document.getElementById('orders').innerText = totalOrders;
        cart = []; updateCart(); closePay();
        Swal.fire('CONFIRMED', 'Contract Activated.', 'success');
    }

    function closePay() { document.getElementById('pay-modal').style.display = 'none'; }
    function showTab(id) {
        ['arsenal', 'vips', 'boss'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
        document.getElementById('tab-'+id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
